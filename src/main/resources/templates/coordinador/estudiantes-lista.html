<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Gestión de Estudiantes')}"></th:block>
</head>
<body class="bg-slate-50 min-h-screen flex font-sans text-slate-800">

    <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

    <main class="flex-1 p-10 overflow-y-auto flex flex-col">
        <div class="max-w-6xl mx-auto w-full flex-1">
<header class="mb-8 mt-2 flex justify-between items-end">
    <div>
        <h1 class="text-3xl font-bold text-[#0B2A4A]"><i class="fa-solid fa-user-graduate mr-2"></i> Gestión de Estudiantes</h1>
    </div>
    
    <form th:action="@{/coordinador/estudiantes}" method="GET" class="flex gap-2 bg-white p-2 rounded-xl shadow-sm border">
        <select name="semestre" class="bg-slate-50 border-none rounded-lg px-3 py-2 text-sm outline-none focus:ring-1 focus:ring-blue-500">
            <option value="">Todos los Semestres</option>
            <option th:each="i : ${#numbers.sequence(1, 2)}" th:value="${i}" th:text="${i + '° Semestre'}" th:selected="${semestreFiltro == i}"></option>
        </select>

        <select name="idCarrera" class="bg-slate-50 border-none rounded-lg px-3 py-2 text-sm outline-none focus:ring-1 focus:ring-blue-500">
            <option value="">Todas las Carreras</option>
            <option th:each="c : ${carreras}" th:value="${c.idCarrera}" th:text="${c.nombreCarrera}" th:selected="${carreraFiltro == c.idCarrera}"></option>
        </select>

        <button type="submit" class="bg-[#0B2A4A] text-white px-4 py-2 rounded-lg font-bold hover:bg-[#1a3a5a] transition-all text-sm">
            <i class="fa-solid fa-filter mr-1"></i> Filtrar
        </button>
        <a th:href="@{/coordinador/estudiantes}" class="bg-slate-100 text-slate-500 px-4 py-2 rounded-lg font-bold hover:bg-slate-200 transition-all text-sm flex items-center">
            Limpiar
        </a>
    </form>
</header>

            <div th:if="${param.exito != null}" class="mb-6 bg-green-50 border-l-4 border-green-500 p-4 text-green-700 rounded shadow-sm">Operación exitosa.</div>
            <div th:if="${param.error != null}" class="mb-6 bg-red-50 border-l-4 border-red-500 p-4 text-red-700 rounded shadow-sm">Error en la operación. Verifica que los datos no estén duplicados.</div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-8">
                <h3 class="font-bold text-[#0B2A4A] mb-4 border-b pb-2">Registro Rápido</h3>
                <form th:action="@{/coordinador/estudiantes/guardar}" method="POST" class="grid grid-cols-1 md:grid-cols-6 gap-4 items-end">
                    <div>
                        <label class="text-xs font-bold text-slate-400 uppercase">No. Control <span class="text-red-500">*</span></label>
                        <input type="text" name="numControl" required class="w-full mt-1 bg-slate-50 border border-slate-200 rounded px-4 py-2 outline-none focus:ring-1 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-400 uppercase">Nombre <span class="text-red-500">*</span></label>
                        <input type="text" name="nombre" required class="w-full mt-1 bg-slate-50 border border-slate-200 rounded px-4 py-2 outline-none focus:ring-1 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-400 uppercase">Apellidos <span class="text-red-500">*</span></label>
                        <input type="text" name="apellidos" required class="w-full mt-1 bg-slate-50 border border-slate-200 rounded px-4 py-2 outline-none focus:ring-1 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-400 uppercase">Correo <span class="text-red-500">*</span></label>
                        <input type="email" name="correo" required class="w-full mt-1 bg-slate-50 border border-slate-200 rounded px-4 py-2 outline-none focus:ring-1 focus:ring-blue-500">
                    </div>
                    
                    <div>
                        <label class="text-xs font-bold text-slate-400 uppercase">Semestre <span class="text-red-500">*</span></label>
                        <input type="number" min="1" max="12" name="semestre" required class="w-full mt-1 bg-slate-50 border border-slate-200 rounded px-4 py-2 outline-none focus:ring-1 focus:ring-blue-500">
                    </div>
                    <div class="md:col-span-1">
                        <label class="text-xs font-bold text-slate-400 uppercase">Carrera <span class="text-red-500">*</span></label>
                        <select name="idCarrera" required class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 outline-none focus:ring-1 focus:ring-blue-500">
                            <option value="" disabled selected>Seleccionar...</option>
                            <option th:each="c : ${carreras}" 
                                    th:value="${c.idCarrera}" 
                                    th:text="${c.nombreCarrera}">Ingeniería...</option>
                        </select>
                    </div>
                    <div class="md:col-span-6 flex justify-end mt-2">
                        <button type="submit" class="bg-[#0B2A4A] text-white px-8 py-2 rounded-lg font-bold hover:bg-[#1a3a5a] transition-colors shadow-sm">Guardar Estudiante</button>
                    </div>
                </form>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 text-slate-400 font-bold border-b border-slate-100 uppercase text-xs">
                        <tr>
                            <th class="px-6 py-4">No. Control</th>
                            <th class="px-6 py-4">Nombre Completo</th>
                            <th class="px-6 py-4">Semestre</th>
                            <th class="px-6 py-4">Carrera</th>
                            <th class="px-6 py-4 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        <tr th:each="e : ${estudiantes}" class="hover:bg-slate-50 transition-colors">
                            <td class="px-6 py-4 font-mono text-slate-500" th:text="${e.numeroControl}"></td>
                            <td class="px-6 py-4 font-bold text-[#0B2A4A]" th:text="${e.usuario.nombre + ' ' + e.usuario.apellidos}"></td>
                            <td class="px-6 py-4 text-slate-500 text-center" th:text="${e.semestreActual + '°'}"></td>
                            <td class="px-6 py-4 text-slate-500" th:text="${e.carrera.nombreCarrera}"></td>
                            <td class="px-6 py-4 text-center space-x-4">
								<a th:href="@{/coordinador/estudiantes/detalle/{id}(id=${e.idEstudiante})}" title="Ver Detalle" class="text-emerald-500 hover:text-emerald-700">
								    <i class="fa-solid fa-eye text-lg"></i>
								</a>
                                <a th:href="@{/coordinador/estudiantes/editar/{id}(id=${e.idEstudiante})}" title="Editar Datos" class="text-blue-500 hover:text-blue-700">
                                    <i class="fa-solid fa-pen-to-square text-lg"></i>
                                </a>
                                <a th:href="@{/coordinador/estudiantes/eliminar/{id}(id=${e.idEstudiante})}" title="Dar de baja" class="text-red-400 hover:text-red-600" onclick="return confirm('¿Estás seguro de dar de baja a este estudiante? Se desvinculará de su grupo actual.');">
                                    <i class="fa-solid fa-trash-can text-lg"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(estudiantes)}">
                            <td colspan="5" class="px-6 py-8 text-center text-slate-400 italic">No se encontraron estudiantes registrados en este semestre.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div th:replace="~{fragments/layout :: footer}"></div>
    </main>
</body>
</html>
