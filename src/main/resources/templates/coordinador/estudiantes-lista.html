<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Gestión de Estudiantes')}"></th:block>
    <style>
        /* Estilo para que el asterisco se vea rojo y resalte */
        .required-mark { color: #ef4444; margin-left: 2px; font-size: 12px; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <div class="flex min-h-screen">
        <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

        <main class="flex-1 flex flex-col min-w-0">
            
            <header class="bg-white border-b border-slate-200 p-6 sticky top-0 z-10">
                <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                    <div>
                        <h1 class="text-2xl font-black text-[#0B172A] tracking-tight">Gestión de Estudiantes</h1>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Administración de Matrícula</p>
                    </div>

                    <form th:action="@{/coordinador/estudiantes}" method="GET" class="flex flex-wrap items-center gap-2">
                        <select name="semestre" class="bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs font-bold outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">Todos los Semestres</option>
                            <option th:each="i : ${#numbers.sequence(1, 12)}" 
                                    th:value="${i}" 
                                    th:text="${i + '° Semestre'}" 
                                    th:selected="${semestreFiltro == i}"></option>
                        </select>

                        <select name="idCarrera" class="bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs font-bold outline-none focus:ring-2 focus:ring-blue-500 max-w-[180px]">
                            <option value="">Todas las Carreras</option>
                            <option th:each="c : ${carreras}" 
                                    th:value="${c.idCarrera}" 
                                    th:text="${c.nombreCarrera}" 
                                    th:selected="${carreraFiltro == c.idCarrera}"></option>
                        </select>

                        <button type="submit" class="bg-[#0B172A] text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-blue-800 transition-all">
                            Filtrar
                        </button>
                        <a th:href="@{/coordinador/estudiantes}" class="text-xs font-bold text-slate-400 hover:text-red-500">Limpiar</a>
                    </form>
                </div>
            </header>

            <div class="p-8 max-w-7xl mx-auto w-full space-y-8">

                <div th:if="${param.exito != null}" class="bg-emerald-50 border border-emerald-100 text-emerald-700 px-6 py-3 rounded-2xl text-sm font-bold animate-pulse">
                    <i class="fa-solid fa-circle-check mr-2"></i> Operación exitosa.
                </div>
                <div th:if="${param.error != null}" class="bg-red-50 border border-red-100 text-red-700 px-6 py-3 rounded-2xl text-sm font-bold">
                    <i class="fa-solid fa-circle-exclamation mr-2"></i> Error en la operación. Verifica los datos.
                </div>

                <section class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden">
                    <div class="bg-[#0B172A] p-5 text-white flex items-center gap-3">
                        <i class="fa-solid fa-user-plus text-amber-400"></i>
                        <h3 class="font-black text-xs uppercase tracking-widest">Registro Rápido</h3>
                    </div>
                    
                    <form th:action="@{/coordinador/estudiantes/guardar}" method="POST" class="p-6 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-7 gap-4 items-end">
                        <div class="lg:col-span-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase block mb-1">No. Control<span class="required-mark">*</span></label>
                            <input type="text" name="numControl" required class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-xs font-bold outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div class="lg:col-span-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase block mb-1">Nombre<span class="required-mark">*</span></label>
                            <input type="text" name="nombre" required class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-xs font-bold">
                        </div>
                        <div class="lg:col-span-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase block mb-1">Apellidos<span class="required-mark">*</span></label>
                            <input type="text" name="apellidos" required class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-xs font-bold">
                        </div>
                        <div class="lg:col-span-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase block mb-1">Correo<span class="required-mark">*</span></label>
                            <input type="email" name="correo" required class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-xs font-bold">
                        </div>
                        <div class="lg:col-span-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase block mb-1">Semestre<span class="required-mark">*</span></label>
                            <input type="number" min="1" max="12" name="semestre" required class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-xs font-bold">
                        </div>
                        <div class="lg:col-span-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase block mb-1">Carrera<span class="required-mark">*</span></label>
                            <select name="idCarrera" required class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-[11px] font-bold outline-none">
                                <option value="" disabled selected>Elegir...</option>
                                <option th:each="c : ${carreras}" th:value="${c.idCarrera}" th:text="${c.nombreCarrera}"></option>
                            </select>
                        </div>
                        <div class="lg:col-span-1">
                            <button type="submit" class="w-full bg-amber-400 text-[#0B172A] py-2 rounded-lg font-black text-[10px] uppercase tracking-widest hover:bg-amber-500 shadow-md transition-all">
                                Guardar
                            </button>
                        </div>
                    </form>
                </section>

                <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-50 border-b border-slate-200">
                                    <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">No. Control</th>
                                    <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Nombre Completo</th>
                                    <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Semestre</th>
                                    <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Carrera</th>
                                    <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Acciones</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100">
                                <tr th:each="e : ${estudiantes}" class="hover:bg-blue-50/30 transition-colors group">
                                    <td class="px-6 py-4">
                                        <span class="font-mono text-xs font-bold text-blue-600" th:text="${e.numeroControl}"></span>
                                    </td>
                                    <td class="px-6 py-4 font-bold text-slate-700 text-sm" th:text="${e.usuario.nombre + ' ' + e.usuario.apellidos}"></td>
                                    <td class="px-6 py-4">
                                        <span class="bg-slate-100 text-slate-600 text-[10px] font-black px-2 py-1 rounded" th:text="${e.semestreActual + '°'}"></span>
                                    </td>
                                    <td class="px-6 py-4 text-xs text-slate-500" th:text="${e.carrera.nombreCarrera}"></td>
                                    <td class="px-6 py-4 text-right">
                                        <div class="flex justify-end gap-2">
                                            <a th:href="@{/coordinador/estudiantes/detalle/{id}(id=${e.idEstudiante})}" class="text-blue-600 hover:text-blue-800 text-xs font-bold">Ver</a>
                                            <span class="text-slate-200">|</span>
                                            <a th:href="@{/coordinador/estudiantes/editar/{id}(id=${e.idEstudiante})}" class="text-amber-600 hover:text-amber-800 text-xs font-bold">Editar</a>
                                            <span class="text-slate-200">|</span>
                                            <a th:href="@{/coordinador/estudiantes/eliminar/{id}(id=${e.idEstudiante})}" 
                                               onclick="return confirm('¿Estás seguro?');" class="text-red-500 hover:text-red-700 text-xs font-bold">Baja</a>
                                        </div>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(estudiantes)}">
                                    <td colspan="5" class="px-6 py-12 text-center text-slate-400 italic">No se encontraron estudiantes registrados.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div th:replace="~{fragments/layout :: footer}"></div>
            </div>
        </main>
    </div>

</body>
</html>
