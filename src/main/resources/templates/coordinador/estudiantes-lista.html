<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Gestión de Estudiantes')}"></th:block>
</head>
<body>

    <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

    <main>
        <section>
            <header>
                <h1>Gestión de Estudiantes</h1>
                
                <!-- Formulario de Filtros -->
                <form th:action="@{/coordinador/estudiantes}" method="GET">
                    <select name="semestre">
                        <option value="">Todos los Semestres</option>
                        <option th:each="i : ${#numbers.sequence(1, 12)}" 
                                th:value="${i}" 
                                th:text="${i + '° Semestre'}" 
                                th:selected="${semestreFiltro == i}"></option>
                    </select>

                    <select name="idCarrera">
                        <option value="">Todas las Carreras</option>
                        <option th:each="c : ${carreras}" 
                                th:value="${c.idCarrera}" 
                                th:text="${c.nombreCarrera}" 
                                th:selected="${carreraFiltro == c.idCarrera}"></option>
                    </select>

                    <button type="submit">Filtrar</button>
                    <a th:href="@{/coordinador/estudiantes}">Limpiar</a>
                </form>
            </header>

            <!-- Mensajes de Estado -->
            <div th:if="${param.exito != null}">Operación exitosa.</div>
            <div th:if="${param.error != null}">Error en la operación. Verifica los datos.</div>

            <br>

            <!-- Registro Rápido de Estudiantes -->
            <section>
                <h3>Registro Rápido</h3>
                <form th:action="@{/coordinador/estudiantes/guardar}" method="POST">
                    <label>No. Control *</label>
                    <input type="text" name="numControl" required>
                    
                    <label>Nombre *</label>
                    <input type="text" name="nombre" required>
                    
                    <label>Apellidos *</label>
                    <input type="text" name="apellidos" required>
                    
                    <label>Correo *</label>
                    <input type="email" name="correo" required>
                    
                    <label>Semestre *</label>
                    <input type="number" min="1" max="12" name="semestre" required>
                    
                    <label>Carrera *</label>
                    <select name="idCarrera" required>
                        <option value="" disabled selected>Seleccionar...</option>
                        <option th:each="c : ${carreras}" 
                                th:value="${c.idCarrera}" 
                                th:text="${c.nombreCarrera}"></option>
                    </select>
                    
                    <button type="submit">Guardar Estudiante</button>
                </form>
            </section>

            <br>

            <!-- Tabla de Administración -->
            <table>
                <thead>
                    <tr>
                        <th>No. Control</th>
                        <th>Nombre Completo</th>
                        <th>Semestre</th>
                        <th>Carrera</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="e : ${estudiantes}">
                        <td th:text="${e.numeroControl}"></td>
                        <td th:text="${e.usuario.nombre + ' ' + e.usuario.apellidos}"></td>
                        <td th:text="${e.semestreActual + '°'}"></td>
                        <td th:text="${e.carrera.nombreCarrera}"></td>
                        <td>
                            <a th:href="@{/coordinador/estudiantes/detalle/{id}(id=${e.idEstudiante})}">Ver</a> |
                            <a th:href="@{/coordinador/estudiantes/editar/{id}(id=${e.idEstudiante})}">Editar</a> |
                            <a th:href="@{/coordinador/estudiantes/eliminar/{id}(id=${e.idEstudiante})}" 
                               onclick="return confirm('¿Estás seguro?');">Baja</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(estudiantes)}">
                        <td colspan="5">No se encontraron estudiantes registrados.</td>
                    </tr>
                </tbody>
            </table>
        </section>

        <div th:replace="~{fragments/layout :: footer}"></div>
    </main>
</body>
</html>
