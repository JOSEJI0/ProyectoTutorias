<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Centro de Búsquedas')}"></th:block>
</head>
<body class="bg-slate-50 min-h-screen flex font-sans text-slate-800">

    <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

    <main class="flex-1 p-10 overflow-y-auto flex flex-col">
        <div class="max-w-6xl mx-auto w-full flex-1">
            <header class="mb-8 mt-2">
                <h1 class="text-3xl font-bold text-[#0B2A4A]"><i class="fa-solid fa-magnifying-glass mr-2"></i> Centro de Búsquedas</h1>
                <p class="text-slate-500">Módulo de consultas operativas de tutoría.</p>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-blue-100">
                    <h3 class="font-bold text-[#0B2A4A] mb-4">Tutores por Semestre</h3>
                    <form th:action="@{/coordinador/buscar-tutores}" method="GET" class="space-y-4">
                        <div>
                            <label class="text-xs font-bold text-slate-400 uppercase">ID del Periodo Escolar</label>
                            <input type="number" name="idPeriodo" placeholder="Ej. 1" required class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold text-sm hover:bg-blue-700 transition-colors">Buscar</button>
                    </form>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-emerald-100">
                    <h3 class="font-bold text-[#0B2A4A] mb-4">Historial de Tutorado</h3>
                    <form th:action="@{/coordinador/buscar-historial-alumno}" method="GET" class="space-y-4">
                        <div>
                            <label class="text-xs font-bold text-slate-400 uppercase">ID del Estudiante</label>
                            <input type="number" name="idEstudiante" placeholder="Ej. 1" required class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-emerald-500">
                        </div>
                        <button type="submit" class="w-full bg-emerald-600 text-white py-2 rounded-lg font-bold text-sm hover:bg-emerald-700 transition-colors">Buscar</button>
                    </form>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-purple-100">
                    <h3 class="font-bold text-[#0B2A4A] mb-4">Actividades por Fecha</h3>
                    <form th:action="@{/coordinador/buscar-actividades}" method="GET" class="space-y-4">
                        <div>
                            <label class="text-xs font-bold text-slate-400 uppercase">Fecha de Impartición</label>
                            <input type="date" name="fecha" required class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-purple-500">
                        </div>
                        <button type="submit" class="w-full bg-purple-600 text-white py-2 rounded-lg font-bold text-sm hover:bg-purple-700 transition-colors">Buscar</button>
                    </form>
                </div>
            </div>
        </div>
        
        <div th:replace="~{fragments/layout :: footer}"></div>
    </main>

</body>
</html>
