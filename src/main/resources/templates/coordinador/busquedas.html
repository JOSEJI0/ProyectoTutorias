<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Centro de Búsquedas')}"></th:block>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <div class="flex min-h-screen">
        <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

        <main class="flex-1 flex flex-col min-w-0">
            
            <header class="bg-white/80 backdrop-blur-md border-b border-slate-200 p-4 px-10 sticky top-0 z-30">
                <div class="flex items-center gap-2 text-xs font-bold text-slate-400 uppercase tracking-[0.15em]">
                    <a th:href="@{/coordinador/panel}" class="hover:text-blue-600 transition-colors">Panel</a>
                    <i class="fa-solid fa-chevron-right text-[8px]"></i>
                    <span class="text-[#0B172A]">Centro de Búsquedas</span>
                </div>
            </header>

            <div class="p-10 max-w-6xl mx-auto w-full">
                
                <div class="mb-12 text-center">
                    <div class="inline-flex h-16 w-16 bg-[#0B172A] rounded-2xl items-center justify-center text-amber-400 shadow-xl mb-6">
                        <i class="fa-solid fa-magnifying-glass-chart text-2xl"></i>
                    </div>
                    <h1 class="text-4xl font-black text-[#0B172A] tracking-tight">Centro de Búsquedas</h1>
                </div>

                <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all flex flex-col">
                        <div class="flex items-center gap-4 mb-8">
                            <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-xl shadow-inner">
                                <i class="fa-solid fa-chalkboard-user"></i>
                            </div>
                            <h3 class="font-black text-[#0B172A] leading-tight uppercase text-xs tracking-widest">Tutores por <br>Periodo</h3>
                        </div>
                        
                        <form th:action="@{/coordinador/buscar-tutores}" method="GET" class="space-y-6 flex-1 flex flex-col justify-between">
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2 px-1">Periodo Escolar</label>
                                <select name="idPeriodo" required
                                        class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white font-bold transition-all">
                                    <option value="">Selecciona un periodo</option>
                                    <option th:each="periodo : ${periodos}"
                                            th:value="${periodo.idPeriodo}"
                                            th:text="${periodo.nombrePeriodo}">Periodo</option>
                                </select>
                            </div>
                            <button type="submit" class="w-full py-4 bg-[#0B172A] text-white rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-blue-800 transition-all shadow-lg shadow-blue-100">
                                <i class="fa-solid fa-search mr-2"></i> Consultar
                            </button>
                        </form>
                    </div>

                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all flex flex-col">
                        <div class="flex items-center gap-4 mb-8">
                            <div class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center text-xl shadow-inner">
                                <i class="fa-solid fa-address-book"></i>
                            </div>
                            <h3 class="font-black text-[#0B172A] leading-tight uppercase text-xs tracking-widest">Expediente de <br>Tutorado</h3>
                        </div>
                        
                        <form th:action="@{/coordinador/buscar-historial-alumno}" method="GET" class="space-y-6 flex-1 flex flex-col justify-between">
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2 px-1">Tutorado</label>
                                <select name="idEstudiante" required
                                        class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white font-bold transition-all">
                                    <option value="">Selecciona un tutorado</option>
                                    <option th:each="estudiante : ${estudiantes}"
                                            th:value="${estudiante.idEstudiante}"
                                            th:text="${estudiante.numeroControl + ' - ' + estudiante.usuario.nombre + ' ' + estudiante.usuario.apellidos}">Tutorado</option>
                                </select>
                            </div>
                            <button type="submit" class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-emerald-700 transition-all shadow-lg shadow-emerald-100">
                                <i class="fa-solid fa-history mr-2"></i> Ver Historial
                            </button>
                        </form>
                    </div>

                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all flex flex-col">
                        <div class="flex items-center gap-4 mb-8">
                            <div class="w-12 h-12 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center text-xl shadow-inner">
                                <i class="fa-solid fa-calendar-day"></i>
                            </div>
                            <h3 class="font-black text-[#0B172A] leading-tight uppercase text-xs tracking-widest">Actividades <br>por Fecha</h3>
                        </div>
                        
                        <form th:action="@{/coordinador/buscar-actividades}" method="GET" class="space-y-6 flex-1 flex flex-col justify-between">
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2 px-1">Fecha de Impartición</label>
                                <input type="date" name="fecha" required
                                       class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-amber-500 focus:bg-white font-bold transition-all">
                            </div>
                            <button type="submit" class="w-full py-4 bg-amber-400 text-[#0B172A] rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-amber-500 transition-all shadow-lg shadow-amber-100">
                                <i class="fa-solid fa-calendar-check mr-2"></i> Filtrar Fecha
                            </button>
                        </form>
                    </div>

                </section>

                <div th:replace="~{fragments/layout :: footer}"></div>
            </div>
        </main>
    </div>

</body>
</html>
