<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Centro de Búsquedas')}"></th:block>
</head>
<body>

    <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

    <main>
        <header>
            <h1>Centro de Búsquedas</h1>
            <p>Módulo de consultas operativas de tutoría.</p>
        </header>

        <section>
            <div>
                <h3>Tutores por Semestre</h3>
                <form th:action="@{/coordinador/buscar-tutores}" method="GET">
                    <label>ID del Periodo Escolar</label>
                    <input type="number" name="idPeriodo" placeholder="Ej. 1" required>
                    <button type="submit">Buscar</button>
                </form>
            </div>

            <br>

            <div>
                <h3>Historial de Tutorado</h3>
                <form th:action="@{/coordinador/buscar-historial-alumno}" method="GET">
                    <label>ID del Estudiante</label>
                    <input type="number" name="idEstudiante" placeholder="Ej. 1" required>
                    <button type="submit">Buscar</button>
                </form>
            </div>

            <br>

            <!-- Formulario para buscar sesiones/actividades por fecha[cite: 4] -->
            <div>
                <h3>Actividades por Fecha</h3>
                <form th:action="@{/coordinador/buscar-actividades}" method="GET">
                    <label>Fecha de Impartición</label>
                    <input type="date" name="fecha" required>
                    <button type="submit">Buscar</button>
                </form>
            </div>
        </section>
        
        <div th:replace="~{fragments/layout :: footer}"></div>
    </main>

</body>
</html>
