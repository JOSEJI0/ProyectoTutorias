<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Tutores por Periodo')}"></th:block>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen flex text-slate-900">

    <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-20 bg-white/50 backdrop-blur-xl flex items-center justify-between px-12 border-b border-slate-200/60 sticky top-0 z-50">
            <div class="flex items-center gap-2 text-slate-400 text-sm font-bold">
                <a th:href="@{/coordinador/busquedas}" class="hover:text-emerald-600 transition-colors uppercase tracking-tighter text-xs">
                    <i class="fa-solid fa-arrow-left mr-2"></i> Volver a Búsquedas
                </a>
            </div>
            <div class="bg-blue-500/10 text-blue-600 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest border border-blue-500/20">
                Consulta de Asignaciones
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-12 custom-scrollbar">
            <div class="max-w-6xl mx-auto w-full">
                
                <div class="mb-12">
                    <p class="text-[10px] font-black text-blue-600 uppercase tracking-[0.2em] mb-2">Resultados de Búsqueda</p>
                    <h1 class="text-4xl font-[800] text-slate-900 tracking-tight" th:text="'Tutores del Periodo ID: ' + ${periodoId}"></h1>
                    <p class="text-slate-500 mt-2 font-medium italic">Relación de docentes y grupos vinculados en el ciclo escolar consultado.</p>
                </div>

                <div class="glass-card rounded-[3rem] shadow-xl overflow-hidden border border-slate-100">
                    <div class="p-8 bg-gradient-to-r from-slate-50 to-white flex justify-between items-center border-b border-slate-100">
                        <h3 class="text-lg font-extrabold text-slate-800">Cuerpo Académico Asignado</h3>
                        <div class="bg-white px-4 py-2 rounded-xl border border-slate-100">
                            <span class="text-[10px] font-black text-blue-600 uppercase" th:text="${#lists.size(resultados)} + ' Grupos Activos'"></span>
                        </div>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest bg-slate-50/50">
                                    <th class="py-6 px-10">Clave de Grupo</th>
                                    <th class="py-6 px-10">Docente / Tutor</th>
                                    <th class="py-6 px-10">Programa Educativo</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-50">
                                <tr th:each="g : ${resultados}" class="hover:bg-blue-50/30 transition-all group">
                                    <td class="py-6 px-10">
                                        <span class="text-xs font-black px-4 py-1.5 bg-slate-100 rounded-lg text-slate-500 group-hover:bg-blue-600 group-hover:text-white transition-all" th:text="${g.nombreGrupo}"></span>
                                    </td>
                                    <td class="py-6 px-10">
                                        <div class="flex items-center gap-4">
                                            <div class="h-10 w-10 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center text-xs font-black shadow-sm" th:text="${#strings.substring(g.tutor.usuario.nombre,0,1)}"></div>
                                            <span class="text-sm font-bold text-slate-700 group-hover:text-blue-700 transition-colors" th:text="${g.tutor.usuario.nombre + ' ' + g.tutor.usuario.apellidos}"></span>
                                        </div>
                                    </td>
                                    <td class="py-6 px-10">
                                        <div class="flex items-center gap-2">
                                            <i class="fa-solid fa-graduation-cap text-slate-300 text-xs"></i>
                                            <span class="text-xs font-bold text-slate-500" th:text="${g.carrera.nombreCarrera}"></span>
                                        </div>
                                    </td>
                                </tr>

                                <tr th:if="${#lists.isEmpty(resultados)}">
                                    <td colspan="3" class="py-20 text-center">
                                        <div class="h-16 w-16 bg-slate-100 text-slate-300 rounded-full flex items-center justify-center mx-auto mb-4">
                                            <i class="fa-solid fa-user-slash text-2xl"></i>
                                        </div>
                                        <p class="text-slate-400 font-bold text-sm uppercase tracking-widest">No se encontraron registros para este periodo</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        
        <div th:replace="~{fragments/layout :: footer}"></div>
    </main>

</body>
</html>
