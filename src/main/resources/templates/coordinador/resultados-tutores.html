<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <!-- Mantiene el fragmento de encabezado reutilizable[cite: 1, 9] -->
    <th:block th:replace="~{fragments/layout :: encabezado('Resultados Tutores')}"></th:block>
</head>
<body>

    <!-- Mantiene la navegación lateral del coordinador[cite: 1, 9] -->
    <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

    <main>
        <section>
            <a th:href="@{/coordinador/busquedas}">Volver a Búsquedas</a>
            
            <!-- Título dinámico con el ID del periodo consultado -->
            <h2 th:text="'Tutores asignados al Periodo ID: ' + ${periodoId}"></h2>
            
            <!-- Tabla simple de resultados -->
            <table>
                <thead>
                    <tr>
                        <th>Grupo</th>
                        <th>Tutor</th>
                        <th>Carrera</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Itera sobre la lista de grupos/tutores encontrados -->
                    <tr th:each="g : ${resultados}">
                        <!-- Nombre del grupo[cite: 9] -->
                        <td th:text="${g.nombreGrupo}"></td>
                        <!-- Nombre completo del tutor a través de su usuario -->
                        <td th:text="${g.tutor.usuario.nombre + ' ' + g.tutor.usuario.apellidos}"></td>
                        <!-- Carrera asociada al grupo -->
                        <td th:text="${g.carrera.nombreCarrera}"></td>
                    </tr>
                    
                    <!-- Manejo de lista vacía[cite: 9] -->
                    <tr th:if="${#lists.isEmpty(resultados)}">
                        <td colspan="3">No se encontraron tutores para este periodo.</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <!-- Mantiene el fragmento de pie de página[cite: 1, 9] -->
    <div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
