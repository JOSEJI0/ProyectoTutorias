<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Detalle del Estudiante')}"></th:block>
</head>
<body>

    <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

    <main>
        <section>
            <a th:href="@{/coordinador/estudiantes}">Volver al Listado</a>
            
            <header>
                <h1>Perfil del Estudiante</h1>
            </header>

            <!-- Datos Personales del Estudiante -->
            <section>
                <div>
                    <p>Nombre Completo</p>
                    <strong th:text="${estudiante.usuario.nombre + ' ' + estudiante.usuario.apellidos}"></strong>
                </div>
                <div>
                    <p>No. Control</p>
                    <code th:text="${estudiante.numeroControl}"></code>
                </div>
                <div>
                    <p>Carrera y Semestre</p>
                    <p th:text="${estudiante.carrera.nombreCarrera + ' - ' + estudiante.semestreActual + '° Semestre'}"></p>
                </div>
                <div>
                    <p>Correo Institucional</p>
                    <p th:text="${estudiante.usuario.correoInstitucional}"></p>
                </div>
                <br>
                <a th:href="@{/coordinador/estudiantes/editar/{id}(id=${estudiante.idEstudiante})}">Editar Perfil</a>
            </section>

            <hr>

            <!-- Historial de Tutorías -->
            <section>
                <h3>Historial de Tutorías</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Periodo</th>
                            <th>Tutor Asignado</th>
                            <th>Grupo</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Itera sobre el historial de tutorías del modelo -->
                        <tr th:each="grupo : ${historialTutorias}">
                            <td th:text="${grupo.periodo.nombrePeriodo}"></td>
                            <td th:text="${grupo.tutor.usuario.nombre + ' ' + grupo.tutor.usuario.apellidos}"></td>
                            <td th:text="${grupo.nombreGrupo}"></td>
                        </tr>
                        <!-- Caso de lista vacía[cite: 8] -->
                        <tr th:if="${#lists.isEmpty(historialTutorias)}">
                            <td colspan="3">No hay registros de tutorías anteriores para este estudiante.</td>
                        </tr>
                    </tbody>
                </table>
            </section>

        </section>
        
        <div th:replace="~{fragments/layout :: footer}"></div>
    </main>
</body>
</html>
