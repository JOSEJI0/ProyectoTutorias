<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Detalle del Grupo')}"></th:block>
    <style>
        /* Estilo para la línea vertical del cronograma */
        .timeline-path { position: relative; }
        .timeline-path::before {
            content: '';
            position: absolute;
            left: 7px;
            top: 10px;
            bottom: 10px;
            width: 2px;
            background: #e2e8f0;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <div class="flex min-h-screen">
        <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

        <main class="flex-1 flex flex-col min-w-0">
            
            <header class="bg-white border-b border-slate-200 p-4 px-10">
                <div class="flex items-center gap-2 text-xs font-bold text-slate-400 uppercase tracking-widest">
                    <a th:href="@{/coordinador/grupos}" class="hover:text-blue-600">Grupos</a>
                    <i class="fa-solid fa-chevron-right text-[8px]"></i>
                    <span class="text-slate-900">Expediente de Grupo</span>
                </div>
            </header>

            <div class="p-10 max-w-7xl mx-auto w-full">
                
                <div class="flex flex-col md:flex-row justify-between items-start mb-10 gap-4">
                    <div>
                        <a th:href="@{/coordinador/grupos}" class="text-blue-600 text-sm font-bold flex items-center gap-2 mb-2 hover:underline">
                            <i class="fa-solid fa-arrow-left"></i> Volver al listado
                        </a>
                        <h1 class="text-4xl font-black text-[#0B172A]" th:text="${grupo.nombreGrupo}">Nombre</h1>
                        <p class="text-slate-500 font-bold" th:text="${grupo.carrera.nombreCarrera}">Carrera</p>
                    </div>
                    <span class="bg-amber-400 text-[#0B172A] px-4 py-2 rounded-xl text-xs font-black uppercase" 
                          th:text="${grupo.periodo.nombrePeriodo}">Periodo</span>
                </div>

                <section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                    <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Tutor Responsable</p>
                        <p class="font-bold text-slate-800" th:text="${grupo.tutor.usuario.nombre + ' ' + grupo.tutor.usuario.apellidos}"></p>
                    </div>

                    <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Población</p>
                        <p class="font-bold text-slate-800" th:text="${totalEstudiantes + ' Alumnos registrados'}"></p>
                    </div>

                    <div class="bg-[#0B172A] p-6 rounded-3xl text-white shadow-lg">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Estado PAT</p>
                        <p class="font-bold text-amber-400" th:text="${patInstitucional != null ? 'Plan Vinculado' : 'Sin Plan Base'}"></p>
                    </div>
                </section>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    
                    <div class="lg:col-span-2">
                        <div class="bg-white rounded-[2rem] border border-slate-200 overflow-hidden shadow-sm">
                            <div class="p-6 bg-slate-50 border-b border-slate-200 font-black text-xs uppercase tracking-widest text-slate-600">
                                Estudiantes Asignados
                            </div>
                            <table class="w-full text-left">
                                <thead>
                                    <tr class="text-[10px] font-black text-slate-400 uppercase border-b border-slate-100">
                                        <th class="px-6 py-4">No. Control</th>
                                        <th class="px-6 py-4">Nombre Completo</th>
                                        <th class="px-6 py-4 text-center">Semestre</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100">
                                    <tr th:each="estudiante : ${grupo.estudiantes}" class="hover:bg-slate-50 transition-colors">
                                        <td class="px-6 py-4 font-mono text-xs font-bold text-blue-600" th:text="${estudiante.numeroControl}"></td>
                                        <td class="px-6 py-4 font-bold text-slate-700 text-sm" th:text="${estudiante.usuario.nombre + ' ' + estudiante.usuario.apellidos}"></td>
                                        <td class="px-6 py-4 text-center">
                                            <span class="text-xs font-black text-slate-500" th:text="${estudiante.semestreActual + '°'}"></span>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(grupo.estudiantes)}">
                                        <td colspan="3" class="px-6 py-12 text-center text-slate-400 italic">No hay alumnos en este grupo.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="lg:col-span-1">
                        <div class="bg-white rounded-[2rem] border border-slate-200 p-8 shadow-sm">
                            <h3 class="font-black text-slate-800 uppercase tracking-widest text-xs mb-8">Cronograma PAT</h3>
                            
                            <div th:if="${patInstitucional == null}" class="mb-6 p-4 bg-amber-50 rounded-xl text-amber-700 text-xs font-bold border border-amber-100">
                                <i class="fa-solid fa-triangle-exclamation mr-2"></i> Sin PAT Institucional asignado.
                            </div>

                            <div class="timeline-path space-y-10">
                                <div th:each="act : ${actividadesGrupo}" class="relative pl-8">
                                    <div class="absolute left-0 top-1 w-4 h-4 rounded-full border-2 border-white shadow-sm"
                                         th:classappend="${act.estatus == 'COMPLETADO' ? 'bg-emerald-500' : 'bg-amber-400'}"></div>
                                    
                                    <div>
                                        <div class="flex justify-between items-center mb-1">
                                            <span class="text-[10px] font-black text-slate-400 uppercase" th:text="'Semana ' + ${act.semanaProgramada}"></span>
                                            <span class="text-[9px] font-black px-2 py-0.5 rounded-full" 
                                                  th:classappend="${act.estatus == 'COMPLETADO' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}"
                                                  th:text="${act.estatus}"></span>
                                        </div>
                                        <h4 class="font-bold text-slate-800 text-sm" th:text="${act.titulo}"></h4>
                                        <p class="text-xs text-slate-500 mt-1" th:text="${act.descripcion}"></p>
                                    </div>
                                </div>
                                
                                <div th:if="${#lists.isEmpty(actividadesGrupo)}" class="text-center text-slate-400 py-4 italic text-sm">
                                    Pendiente de adaptación por el tutor.
                                </div>
                            </div>
                        </div>
                    </div>

                </div>

                <div th:replace="~{fragments/layout :: footer}"></div>
            </div>
        </main>
    </div>

</body>
</html>
