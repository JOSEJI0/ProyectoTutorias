<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <!-- Mantiene el fragmento de encabezado del layout base[cite: 1, 4] -->
    <th:block th:replace="~{fragments/layout :: encabezado('Actividades por Fecha')}"></th:block>
</head>
<body>

    <!-- Mantiene la navegación lateral del coordinador[cite: 1, 4] -->
    <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

    <main>
        <section>
            <a th:href="@{/coordinador/busquedas}">Volver a Búsquedas</a>
            
            <!-- Título dinámico con la fecha consultada -->
            <h2 th:text="'Sesiones impartidas el ' + ${fechaBusqueda}"></h2>
            
            <!-- Mensaje en caso de no encontrar resultados -->
            <div th:if="${#lists.isEmpty(resultados)}">
                No se registraron sesiones en esta fecha.
            </div>

            <!-- Listado de sesiones encontradas -->
            <ul>
                <li th:each="s : ${resultados}">
                    <div>
                        <!-- Título de la actividad programada en el PAT -->
                        <h4 th:text="${s.actividad.titulo}"></h4>
                        
                        <!-- Información del grupo y el tutor responsable -->
                        <p th:text="'Grupo: ' + ${s.grupo.nombreGrupo} + ' | Tutor: ' + ${s.grupo.tutor.usuario.nombre}"></p>
                    </div>
                    
                    <!-- Estado actual del registro de la sesión[cite: 4] -->
                    <span th:text="${s.estatusRegistro}"></span>
                    <hr>
                </li>
            </ul>
        </section>
    </main>

    <!-- Mantiene el pie de página del layout[cite: 1, 4] -->
    <div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
