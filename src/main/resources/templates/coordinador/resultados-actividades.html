<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Sesiones por Fecha')}"></th:block>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen flex text-slate-900">

    <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-20 bg-white/50 backdrop-blur-xl flex items-center justify-between px-12 border-b border-slate-200/60 sticky top-0 z-50">
            <div class="flex items-center gap-2 text-slate-400 text-sm font-bold">
                <a th:href="@{/coordinador/busquedas}" class="hover:text-emerald-600 transition-colors uppercase tracking-tighter text-xs">
                    <i class="fa-solid fa-arrow-left mr-2"></i> Volver a Búsquedas
                </a>
            </div>
            <div class="bg-purple-500/10 text-purple-600 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest border border-purple-500/20">
                Historial de Sesiones
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-12 custom-scrollbar">
            <div class="max-w-5xl mx-auto w-full">
                
                <div class="mb-12">
                    <p class="text-[10px] font-black text-purple-600 uppercase tracking-[0.2em] mb-2">Resultados de Consulta</p>
                    <h1 class="text-4xl font-[800] text-slate-900 tracking-tight" th:text="'Sesiones del ' + ${fechaBusqueda}"></h1>
                    <p class="text-slate-500 mt-2 font-medium italic">Listado de actividades académicas impartidas en la fecha seleccionada.</p>
                </div>

                <div th:if="${#lists.isEmpty(resultados)}" class="glass-card p-20 text-center rounded-[3rem] border-2 border-dashed border-slate-200">
                    <div class="h-16 w-16 bg-slate-100 text-slate-300 rounded-full flex items-center justify-center mx-auto mb-6">
                        <i class="fa-solid fa-calendar-xmark text-2xl"></i>
                    </div>
                    <h4 class="text-slate-400 font-bold text-sm uppercase tracking-widest">Sin registros encontrados</h4>
                    <p class="text-slate-300 text-xs mt-2 font-medium">No se registraron sesiones de tutoría en esta fecha específica.</p>
                </div>

                <div class="space-y-6">
                    <div th:each="s : ${resultados}" class="glass-card p-8 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col md:flex-row justify-between items-center gap-6 hover:border-purple-200 transition-all group">
                        <div class="flex items-center gap-6">
                            <div class="h-14 w-14 bg-purple-50 text-purple-600 rounded-2xl flex items-center justify-center shadow-lg shadow-purple-500/5 group-hover:bg-purple-600 group-hover:text-white transition-all">
                                <i class="fa-regular fa-calendar-check text-xl"></i>
                            </div>
                            <div>
                                <h4 class="text-xl font-[800] text-slate-800 tracking-tight" th:text="${s.actividad.titulo}"></h4>
                                <div class="flex flex-wrap gap-x-4 gap-y-1 mt-2">
                                    <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">
                                        <i class="fa-solid fa-users-rectangle mr-1"></i> Grupo: <span class="text-slate-600" th:text="${s.grupo.nombreGrupo}"></span>
                                    </p>
                                    <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">
                                        <i class="fa-solid fa-user-tie mr-1"></i> Tutor: <span class="text-slate-600" th:text="${s.grupo.tutor.usuario.nombre + ' ' + s.grupo.tutor.usuario.apellidos}"></span>
                                    </p>
                                </div>
                            </div>
                        </div>
                        
                        <div class="flex items-center gap-4">
                            <span class="bg-purple-100 text-purple-700 px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest border border-purple-200/50" 
                                  th:text="${s.estatusRegistro}"></span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
        
        <div th:replace="~{fragments/layout :: footer}"></div>
    </main>

</body>
</html>
