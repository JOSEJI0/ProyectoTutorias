<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Editar Tutor')}"></th:block>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen flex text-slate-900">

    <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-20 bg-white/50 backdrop-blur-xl flex items-center justify-between px-12 border-b border-slate-200/60 sticky top-0 z-50">
            <div class="flex items-center gap-2 text-slate-400 text-sm font-bold">
                <a th:href="@{/coordinador/tutores}" class="hover:text-emerald-600 transition-colors uppercase tracking-tighter text-xs">
                    <i class="fa-solid fa-arrow-left mr-2"></i> Volver al listado
                </a>
            </div>
            <div class="bg-emerald-500/10 text-emerald-600 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest border border-emerald-500/20">
                Perfil de Personal
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-12">
            <div class="max-w-4xl mx-auto w-full">
                
                <div class="mb-12 text-center md:text-left">
                    <div class="inline-flex items-center justify-center h-14 w-14 bg-white rounded-2xl shadow-sm border border-slate-100 text-emerald-500 mb-6">
                        <i class="fa-solid fa-user-gear text-xl"></i>
                    </div>
                    <h1 class="text-4xl font-[800] text-slate-900 tracking-tight">Editar Tutor</h1>
                    <p class="text-slate-500 mt-2 font-medium">Actualiza la información administrativa y de contacto del docente.</p>
                </div>

                <div class="glass-card p-10 rounded-[3rem] shadow-xl border border-slate-100">
                    <form th:action="@{/coordinador/tutores/actualizar}" method="POST" class="space-y-8">
                        <input type="hidden" name="idTutor" th:value="${tutor.idTutor}">

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div>
                                <label class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest block mb-3 px-1">RFC del Empleado</label>
                                <div class="relative">
                                    <span class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-300">
                                        <i class="fa-solid fa-address-card"></i>
                                    </span>
                                    <input type="text" name="rfc" th:value="${tutor.rfcEmpleado}" required 
                                           class="w-full bg-slate-100/50 border-2 border-transparent focus:border-emerald-500/20 rounded-2xl px-12 py-4 text-sm font-bold text-slate-700 outline-none transition-all uppercase"
                                           placeholder="ABCD900101XYZ">
                                </div>
                            </div>

                            <div>
                                <label class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest block mb-3 px-1">Correo Institucional</label>
                                <div class="relative">
                                    <span class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-300">
                                        <i class="fa-solid fa-envelope"></i>
                                    </span>
                                    <input type="email" name="correo" th:value="${tutor.usuario.correoInstitucional}" required 
                                           class="w-full bg-slate-100/50 border-2 border-transparent focus:border-emerald-500/20 rounded-2xl px-12 py-4 text-sm font-semibold text-slate-700 outline-none transition-all"
                                           placeholder="ejemplo@itch.edu.mx">
                                </div>
                            </div>

                            <div>
                                <label class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest block mb-3 px-1">Nombre(s)</label>
                                <input type="text" name="nombre" th:value="${tutor.usuario.nombre}" required 
                                       class="w-full bg-slate-100/50 border-2 border-transparent focus:border-emerald-500/20 rounded-2xl px-5 py-4 text-sm font-semibold text-slate-700 outline-none transition-all">
                            </div>

                            <div>
                                <label class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest block mb-3 px-1">Apellidos</label>
                                <input type="text" name="apellidos" th:value="${tutor.usuario.apellidos}" required 
                                       class="w-full bg-slate-100/50 border-2 border-transparent focus:border-emerald-500/20 rounded-2xl px-5 py-4 text-sm font-semibold text-slate-700 outline-none transition-all">
                            </div>
                        </div>

                        <div class="flex flex-col md:flex-row items-center justify-end gap-4 pt-6 border-t border-slate-100">
                            <a th:href="@{/coordinador/tutores}" class="text-slate-400 hover:text-slate-600 font-bold text-xs uppercase tracking-widest transition-colors">
                                Cancelar
                            </a>
                            <button type="submit" class="w-full md:w-auto bg-slate-900 hover:bg-emerald-600 text-white px-12 py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-2xl shadow-slate-900/10 transition-all flex items-center justify-center gap-3 group">
                                Guardar Cambios <i class="fa-solid fa-save transition-transform group-hover:scale-110"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <p class="mt-12 text-center text-[10px] font-black text-slate-300 uppercase tracking-[0.4em]">
                © 2026 IT Chilpancingo
            </p>
        </div>
        
        <div th:replace="~{fragments/layout :: footer}"></div>
    </main>
</body>
</html>
