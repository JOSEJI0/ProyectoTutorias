<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Editar Tutor')}"></th:block>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <div class="flex min-h-screen">
        <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

        <main class="flex-1 flex flex-col min-w-0 h-screen overflow-y-auto custom-scrollbar">
            
            <header class="bg-white border-b border-slate-200 p-4 px-10 sticky top-0 z-30">
                <div class="flex items-center gap-2 text-xs font-bold text-slate-400 uppercase tracking-widest">
                    <a th:href="@{/coordinador/tutores}" class="hover:text-blue-600 transition-colors">Tutores</a>
                    <i class="fa-solid fa-chevron-right text-[8px]"></i>
                    <span class="text-[#0B172A]">Modificar Perfil Docente</span>
                </div>
            </header>

            <div class="p-10 max-w-4xl mx-auto w-full">
                
                <a th:href="@{/coordinador/tutores}" class="group inline-flex items-center gap-2 text-slate-400 hover:text-[#0B172A] font-black text-[10px] uppercase tracking-[0.2em] mb-8 transition-all">
                    <i class="fa-solid fa-arrow-left-long transition-transform group-hover:-translate-x-1"></i> 
                    Volver al Listado
                </a>

                <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden">
                    
                    <div class="bg-[#0B172A] p-8 text-white relative">
                        <h1 class="text-2xl font-black tracking-tight">Editar Información del Tutor</h1>
                        <p class="text-slate-400 text-sm">Actualiza las credenciales y la fotografía del docente.</p>
                    </div>

                    <form th:action="@{/coordinador/tutores/actualizar}" method="POST" enctype="multipart/form-data" class="p-8 space-y-8">
                        
                        <input type="hidden" name="idTutor" th:value="${tutor.idTutor}">
                        
                        <div class="flex flex-col md:flex-row items-center gap-8 p-6 bg-slate-50 rounded-[2rem] border border-dashed border-slate-200">
                            <div class="shrink-0 text-center">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Foto Actual</p>
                                <div class="w-24 h-24 rounded-2xl overflow-hidden border-2 border-white shadow-sm">
                                    <img th:src="${tutor.usuario.fotoPerfil != null ? '/uploads/' + tutor.usuario.fotoPerfil : '/img/default-avatar.png'}" 
                                         alt="Foto actual" class="w-full h-full object-cover">
                                </div>
                            </div>
                            <div class="flex-1">
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Subir Nueva Fotografía</label>
                                <input type="file" name="foto" accept="image/*" 
                                       class="block w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-[10px] file:font-black file:uppercase file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                                <p class="mt-2 text-[10px] text-slate-400 font-medium italic">Opcional: Deja vacío para conservar la imagen actual.</p>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            
                            <div class="md:col-span-2">
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 px-1">RFC del Empleado *</label>
                                <input type="text" name="rfc" th:value="${tutor.rfcEmpleado}" required 
                                       class="w-full bg-slate-50 border border-slate-200 rounded-xl px-5 py-3 outline-none focus:ring-2 focus:ring-blue-500 font-mono font-bold text-slate-700">
                            </div>

                            <div class="md:col-span-2">
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 px-1">Correo Institucional *</label>
                                <input type="email" name="correo" th:value="${tutor.usuario.correoInstitucional}" required 
                                       class="w-full bg-slate-50 border border-slate-200 rounded-xl px-5 py-3 outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-700">
                            </div>

                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 px-1">Nombre(s) *</label>
                                <input type="text" name="nombre" th:value="${tutor.usuario.nombre}" required 
                                       class="w-full bg-slate-50 border border-slate-200 rounded-xl px-5 py-3 outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-700">
                            </div>

                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 px-1">Apellidos *</label>
                                <input type="text" name="apellidos" th:value="${tutor.usuario.apellidos}" required 
                                       class="w-full bg-slate-50 border border-slate-200 rounded-xl px-5 py-3 outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-700">
                            </div>

                        </div>

                        <div class="flex items-center justify-end gap-6 pt-6 border-t border-slate-100">
                            <a th:href="@{/coordinador/tutores}" class="text-xs font-black text-slate-400 uppercase tracking-widest hover:text-red-500 transition-colors">
                                Cancelar
                            </a>
                            <button type="submit" class="bg-amber-400 text-[#0B172A] px-10 py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl shadow-amber-200 hover:bg-amber-500 transition-all flex items-center gap-2">
                                <i class="fa-solid fa-save"></i> Guardar Cambios
                            </button>
                        </div>

                    </form>
                </div>

                <div th:replace="~{fragments/layout :: footer}"></div>
            </div>
        </main>
    </div>

</body>
</html>
