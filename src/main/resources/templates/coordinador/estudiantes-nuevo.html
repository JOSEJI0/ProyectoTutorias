<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Nuevo Tutorado')}"></th:block>
</head>
<body>

    <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

    <main>
        <header>
            <a th:href="@{/coordinador/estudiantes}">Volver al listado</a>
            <p>Registro de Matrícula</p>
        </header>

        <section>
            <h1>Alta de Estudiante</h1>
            <p>Completa el perfil para integrar al alumno al programa institucional de tutorías.</p>

            <form th:action="@{/coordinador/estudiantes/guardar}" th:object="${estudiante}" method="POST">
                
                <!-- Sección 1: Información de Usuario (Relación con la entidad Usuario) -->
                <fieldset>
                    <legend>Información de Acceso al Sistema</legend>
                    
                    <label>Nombre(s)</label>
                    <input type="text" th:field="*{usuario.nombre}" required>

                    <br>

                    <label>Apellido(s)</label>
                    <input type="text" th:field="*{usuario.apellidos}" required>

                    <br>

                    <label>Correo Institucional</label>
                    <input type="email" th:field="*{usuario.correoInstitucional}" required>

                    <br>

                    <label>Contraseña Temporal</label>
                    <input type="password" name="password" required>
                </fieldset>

                <br>

                <!-- Sección 2: Datos Académicos (Entidad Estudiante) -->
                <fieldset>
                    <legend>Credenciales Académicas</legend>

                    <label>Número de Control</label>
                    <input type="text" th:field="*{numeroControl}" required>

                    <br>

                    <label>Semestre Actual</label>
                    <select th:field="*{semestreActual}">
                        <option th:each="i : ${#numbers.sequence(1, 12)}" th:value="${i}" th:text="${i} + '° Semestre'"></option>
                    </select>

                    <br>

                    <label>Programa Educativo (Carrera)</label>
                    <select th:field="*{carrera.idCarrera}">
                        <option th:each="c : ${carreras}" th:value="${c.idCarrera}" th:text="${c.nombreCarrera}"></option>
                    </select>
                </fieldset>

                <br>

                <div>
                    <a th:href="@{/coordinador/estudiantes}">Cancelar Registro</a>
                    <button type="submit">Confirmar Alta</button>
                </div>
            </form>
        </section>

        <div th:replace="~{fragments/layout :: footer}"></div>
    </main>
</body>
</html>
