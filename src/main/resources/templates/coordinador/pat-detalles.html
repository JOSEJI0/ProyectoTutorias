<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Temas del PAT')}"></th:block>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen flex text-slate-900">

    <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-20 bg-white/50 backdrop-blur-xl flex items-center justify-between px-12 border-b border-slate-200/60 sticky top-0 z-50">
            <div class="flex items-center gap-2 text-slate-400 text-sm font-bold">
                <a th:href="@{/coordinador/pat}" class="hover:text-emerald-600 transition-colors uppercase tracking-tighter text-xs">
                    <i class="fa-solid fa-arrow-left mr-2"></i> Volver a Planes
                </a>
            </div>
            <div class="bg-emerald-500/10 text-emerald-600 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest border border-emerald-500/20">
                Gestión de Contenidos
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-12 custom-scrollbar">
            <div class="max-w-6xl mx-auto">
                <div class="mb-12">
                    <p class="text-[10px] font-black text-emerald-600 uppercase tracking-[0.2em] mb-2">Estructura Académica</p>
                    <h1 class="text-4xl font-[800] text-slate-900 tracking-tight" th:text="'Temario del PAT: ' + ${pat.periodo.nombrePeriodo}"></h1>
                    <p class="text-slate-500 mt-2 font-medium italic">Define la secuencia de actividades para el semestre vigente.</p>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                    
                    <div class="lg:col-span-1">
                        <div class="glass-card p-8 rounded-[2.5rem] shadow-xl border border-slate-100 sticky top-4">
                            <div class="flex items-center gap-3 mb-8">
                                <div class="h-10 w-10 bg-slate-900 text-white rounded-xl flex items-center justify-center shadow-lg shadow-slate-900/20">
                                    <i class="fa-solid fa-plus-circle"></i>
                                </div>
                                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest">Agregar Actividad</h3>
                            </div>

                            <form th:action="@{/coordinador/pat/{id}/actividades/guardar(id=${pat.idPat})}" method="POST" class="space-y-6">
                                <div>
                                    <label class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest block mb-2 px-1">Semana Programada</label>
                                    <input type="number" name="semana" placeholder="Ej. 1" required 
                                           class="w-full bg-slate-100/50 border-2 border-transparent focus:border-emerald-500/20 rounded-2xl px-5 py-3 text-sm font-bold text-slate-700 outline-none transition-all">
                                </div>
                                <div>
                                    <label class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest block mb-2 px-1">Título del Tema</label>
                                    <input type="text" name="titulo" placeholder="Ej. Integración Grupal" required 
                                           class="w-full bg-slate-100/50 border-2 border-transparent focus:border-emerald-500/20 rounded-2xl px-5 py-3 text-sm font-semibold text-slate-700 outline-none transition-all">
                                </div>
                                <div>
                                    <label class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest block mb-2 px-1">Descripción de la Actividad</label>
                                    <textarea name="descripcion" rows="4" required placeholder="Describe el objetivo y desarrollo..."
                                              class="w-full bg-slate-100/50 border-2 border-transparent focus:border-emerald-500/20 rounded-2xl px-5 py-3 text-sm font-semibold text-slate-700 outline-none transition-all resize-none"></textarea>
                                </div>
                                <button type="submit" class="w-full bg-slate-900 hover:bg-emerald-600 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-2xl shadow-slate-900/10 transition-all flex items-center justify-center gap-3 group">
                                    Guardar Tema <i class="fa-solid fa-save transition-transform group-hover:scale-110"></i>
                                </button>
                            </form>
                        </div>
                    </div>

                    <div class="lg:col-span-2">
                        <div class="space-y-6">
                            <div th:each="a : ${actividades}" class="glass-card p-8 rounded-[2.5rem] shadow-sm border border-slate-100 flex justify-between items-start group hover:border-emerald-200 transition-all">
                                <div class="flex-1">
                                    <div class="flex items-center gap-3 mb-4">
                                        <span class="bg-emerald-100 text-emerald-700 px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest" th:text="'Semana ' + ${a.semanaProgramada}"></span>
                                    </div>
                                    <h4 class="text-xl font-[800] text-slate-800 tracking-tight" th:text="${a.titulo}"></h4>
                                    <p class="text-sm text-slate-500 mt-3 font-medium leading-relaxed italic" th:text="${a.descripcion}"></p>
                                </div>
                                <div class="ml-6">
                                    <a th:href="@{/coordinador/pat/{idPat}/actividades/eliminar/{idAct}(idPat=${pat.idPat}, idAct=${a.idActividad})}" 
                                       class="h-10 w-10 rounded-xl bg-red-50 text-red-400 flex items-center justify-center hover:bg-red-500 hover:text-white transition-all shadow-sm"
                                       onclick="return confirm('¿Seguro que desea eliminar esta actividad del temario?');">
                                        <i class="fa-solid fa-trash-can text-sm"></i>
                                    </a>
                                </div>
                            </div>

                            <div th:if="${#lists.isEmpty(actividades)}" class="glass-card p-20 text-center rounded-[3rem] border-2 border-dashed border-slate-200">
                                <div class="h-16 w-16 bg-slate-100 text-slate-300 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <i class="fa-solid fa-book-open text-2xl"></i>
                                </div>
                                <h4 class="text-slate-400 font-bold text-sm uppercase tracking-widest">Aún no hay temas registrados para este plan</h4>
                                <p class="text-slate-300 text-xs mt-2 font-medium">Utiliza el formulario de la izquierda para comenzar.</p>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
            
            <footer class="py-12 text-center text-[10px] font-black text-slate-300 uppercase tracking-[0.4em]">
                © 2026 IT Chilpancingo
            </footer>
        </div>
    </main>

</body>
</html>
