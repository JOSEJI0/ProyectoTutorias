<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Editar Estudiante')}"></th:block>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <div class="flex min-h-screen">
        <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

        <main class="flex-1 flex flex-col min-w-0">
            
            <header class="bg-white border-b border-slate-200 p-4 px-10">
                <div class="flex items-center gap-2 text-xs font-bold text-slate-400 uppercase tracking-widest">
                    <a th:href="@{/coordinador/estudiantes}" class="hover:text-blue-600">Estudiantes</a>
                    <i class="fa-solid fa-chevron-right text-[8px]"></i>
                    <span class="text-slate-900">Editar Perfil</span>
                </div>
            </header>

            <div class="p-10 max-w-4xl mx-auto w-full">
                
                <a th:href="@{/coordinador/estudiantes}" class="text-blue-600 text-sm font-bold flex items-center gap-2 mb-6 hover:underline">
                    <i class="fa-solid fa-arrow-left"></i> Volver al Listado
                </a>

                <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden">
                    
                    <div class="bg-[#0B172A] p-8 text-white">
                        <h1 class="text-2xl font-black tracking-tight">Editar Estudiante</h1>
                        <p class="text-slate-400 text-sm">Actualiza los datos personales y académicos del alumno.</p>
                    </div>

                    <form th:action="@{/coordinador/estudiantes/actualizar}" method="POST" class="p-8 space-y-6">
                        
                        <input type="hidden" name="idEstudiante" th:value="${estudiante.idEstudiante}">
                        <input type="hidden" name="activo" th:value="${estudiante.activo}">

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 px-1">No. Control *</label>
                                <input type="text" name="numControl" th:value="${estudiante.numeroControl}" required 
                                       class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 font-mono font-bold text-blue-600">
                            </div>

                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 px-1">Correo Institucional *</label>
                                <input type="email" name="correo" th:value="${estudiante.usuario.correoInstitucional}" required 
                                       class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-700">
                            </div>

                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 px-1">Nombre(s) *</label>
                                <input type="text" name="nombre" th:value="${estudiante.usuario.nombre}" required 
                                       class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-700">
                            </div>

                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 px-1">Apellidos *</label>
                                <input type="text" name="apellidos" th:value="${estudiante.usuario.apellidos}" required 
                                       class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-700">
                            </div>

                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 px-1">Carrera *</label>
                                <select name="idCarrera" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none font-bold text-slate-700">
                                    <option th:each="c : ${carreras}" 
                                            th:value="${c.idCarrera}" 
                                            th:text="${c.nombreCarrera}"
                                            th:selected="${c.idCarrera == estudiante.carrera.idCarrera}"></option>
                                </select>
                            </div>

                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 px-1">Semestre Actual *</label>
                                <input type="number" min="1" max="12" name="semestre" th:value="${estudiante.semestreActual}" required 
                                       class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-700">
                            </div>

                        </div>

                        <div class="pt-6 flex items-center justify-end gap-4 border-t border-slate-100">
                            <a th:href="@{/coordinador/estudiantes}" class="text-xs font-black text-slate-400 uppercase tracking-widest hover:text-red-500">
                                Cancelar
                            </a>
                            <button type="submit" class="bg-amber-400 text-[#0B172A] px-8 py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-amber-200 hover:bg-amber-500 transition-all flex items-center gap-2">
                                <i class="fa-solid fa-save"></i> Guardar Cambios
                            </button>
                        </div>

                    </form>
                </div>

                <div th:replace="~{fragments/layout :: footer}"></div>
            </div>
        </main>
    </div>

</body>
</html>
