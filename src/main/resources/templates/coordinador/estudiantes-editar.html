<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Editar Estudiante')}"></th:block>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen flex items-center justify-center p-6 text-slate-900">

    <div class="max-w-4xl w-full">
        <a th:href="@{/coordinador/estudiantes}" class="group flex items-center gap-2 text-slate-400 hover:text-emerald-600 font-bold text-xs uppercase tracking-widest mb-8 transition-colors">
            <i class="fa-solid fa-arrow-left-long transition-transform group-hover:-translate-x-1"></i> 
            Volver al Listado
        </a>

        <div class="mb-10 text-center md:text-left">
            <div class="inline-flex items-center justify-center h-14 w-14 bg-white rounded-2xl shadow-sm border border-slate-100 text-emerald-500 mb-6">
                <i class="fa-solid fa-user-pen text-xl"></i>
            </div>
            <h1 class="text-4xl font-[800] text-slate-900 tracking-tight">Editar Estudiante</h1>
            <p class="text-slate-500 mt-2 font-medium">Actualiza el perfil académico y personal del alumno seleccionado.</p>
        </div>

        <div class="glass-card p-10 rounded-[3rem] shadow-xl border border-slate-100">
            <form th:action="@{/coordinador/estudiantes/actualizar}" method="POST" class="space-y-8">
                <input type="hidden" name="idEstudiante" th:value="${estudiante.idEstudiante}">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <label class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest block mb-2 px-1">Número de Control</label>
                        <div class="relative">
                            <span class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-300">
                                <i class="fa-solid fa-id-card"></i>
                            </span>
                            <input type="text" name="numControl" th:value="${estudiante.numeroControl}" required 
                                   class="w-full bg-slate-100/50 border-2 border-transparent focus:border-emerald-500/20 rounded-2xl px-12 py-4 text-sm font-bold text-slate-500 outline-none transition-all uppercase">
                        </div>
                    </div>

                    <div>
                        <label class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest block mb-2 px-1">Correo Institucional</label>
                        <div class="relative">
                            <span class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-300">
                                <i class="fa-solid fa-envelope"></i>
                            </span>
                            <input type="email" name="correo" th:value="${estudiante.usuario.correoInstitucional}" required 
                                   class="w-full bg-slate-100/50 border-2 border-transparent focus:border-emerald-500/20 rounded-2xl px-12 py-4 text-sm font-semibold text-slate-700 outline-none transition-all">
                        </div>
                    </div>

                    <div>
                        <label class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest block mb-2 px-1">Nombre(s)</label>
                        <input type="text" name="nombre" th:value="${estudiante.usuario.nombre}" required 
                               class="w-full bg-slate-100/50 border-2 border-transparent focus:border-emerald-500/20 rounded-2xl px-5 py-4 text-sm font-semibold text-slate-700 outline-none transition-all">
                    </div>

                    <div>
                        <label class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest block mb-2 px-1">Apellido(s)</label>
                        <input type="text" name="apellidos" th:value="${estudiante.usuario.apellidos}" required 
                               class="w-full bg-slate-100/50 border-2 border-transparent focus:border-emerald-500/20 rounded-2xl px-5 py-4 text-sm font-semibold text-slate-700 outline-none transition-all">
                    </div>

                    <div>
                        <label class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest block mb-2 px-1">Programa Académico</label>
                        <select name="idCarrera" required 
                                class="w-full bg-slate-100/50 border-2 border-transparent focus:border-emerald-500/20 rounded-2xl px-5 py-4 text-sm font-bold text-slate-700 outline-none cursor-pointer appearance-none transition-all">
                            <option th:each="c : ${carreras}" 
                                    th:value="${c.idCarrera}" 
                                    th:text="${c.nombreCarrera}"
                                    th:selected="${c.idCarrera == estudiante.carrera.idCarrera}">Carrera</option>
                        </select>
                    </div>

                    <div>
                        <label class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest block mb-2 px-1">Semestre Actual</label>
                        <div class="relative">
                            <span class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-300">
                                <i class="fa-solid fa-layer-group"></i>
                            </span>
                            <input type="number" name="semestre" th:value="${estudiante.semestreActual}" required 
                                   class="w-full bg-slate-100/50 border-2 border-transparent focus:border-emerald-500/20 rounded-2xl px-12 py-4 text-sm font-bold text-slate-700 outline-none transition-all">
                        </div>
                    </div>
                </div>

                <div class="flex flex-col md:flex-row items-center justify-end gap-4 pt-6 border-t border-slate-100">
                    <a th:href="@{/coordinador/estudiantes}" class="w-full md:w-auto text-center px-8 py-4 text-slate-400 hover:text-slate-600 font-bold text-xs uppercase tracking-widest transition-colors">
                        Cancelar
                    </a>
                    <button type="submit" class="w-full md:w-auto bg-slate-900 hover:bg-emerald-600 text-white px-12 py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-2xl shadow-slate-900/10 transition-all flex items-center justify-center gap-3 group">
                        Guardar Cambios <i class="fa-solid fa-save transition-transform group-hover:scale-110"></i>
                    </button>
                </div>
            </form>
        </div>
        
        <p class="mt-12 text-center text-[10px] font-black text-slate-300 uppercase tracking-[0.4em]">
            © 2026 IT Chilpancingo
        </p>
    </div>

</body>
</html>
