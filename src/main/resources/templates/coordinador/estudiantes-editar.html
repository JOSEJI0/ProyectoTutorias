<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Editar Estudiante')}"></th:block>
</head>
<body>

    <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

    <main>
        <section>
            <a th:href="@{/coordinador/estudiantes}">Volver al Listado</a>
            
            <header>
                <h1>Editar Estudiante</h1>
                <p>Modifica los datos personales o académicos del tutorado.</p>
            </header>

            <form th:action="@{/coordinador/estudiantes/actualizar}" method="POST">
                <!-- Campos ocultos necesarios para la persistencia de datos -->
                <input type="hidden" name="idEstudiante" th:value="${estudiante.idEstudiante}">
                <input type="hidden" name="activo" th:value="${estudiante.activo}">
                
                <div>
                    <label>No. Control *</label>
                    <br>
                    <input type="text" name="numControl" th:value="${estudiante.numeroControl}" required>
                </div>

                <br>

                <div>
                    <label>Correo Institucional *</label>
                    <br>
                    <input type="email" name="correo" th:value="${estudiante.usuario.correoInstitucional}" required>
                </div>

                <br>

                <div>
                    <label>Nombre *</label>
                    <br>
                    <input type="text" name="nombre" th:value="${estudiante.usuario.nombre}" required>
                </div>

                <br>

                <div>
                    <label>Apellidos *</label>
                    <br>
                    <input type="text" name="apellidos" th:value="${estudiante.usuario.apellidos}" required>
                </div>

                <br>

                <div>
                    <label>Carrera *</label>
                    <br>
                    <select name="idCarrera" required>
                        <!-- Itera sobre el catálogo de carreras y marca la actual como seleccionada -->
                        <option th:each="c : ${carreras}" 
                                th:value="${c.idCarrera}" 
                                th:text="${c.nombreCarrera}"
                                th:selected="${c.idCarrera == estudiante.carrera.idCarrera}">Carrera</option>
                    </select>
                </div>

                <br>

                <div>
                    <label>Semestre Actual *</label>
                    <br>
                    <input type="number" min="1" max="12" name="semestre" th:value="${estudiante.semestreActual}" required>
                </div>
                
                <br>

                <div>
                    <button type="submit">Guardar Cambios</button>
                </div>
            </form>
        </section>

        <div th:replace="~{fragments/layout :: footer}"></div>
    </main>
</body>
</html>
