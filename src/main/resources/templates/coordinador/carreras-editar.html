<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Editar Carrera')}"></th:block>
</head>
<body class="bg-slate-50 min-h-screen flex font-sans text-slate-800">

    <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

    <main class="flex-1 p-10 overflow-y-auto flex flex-col">
        <div class="max-w-2xl mx-auto w-full flex-1">
            <a th:href="@{/coordinador/carreras}" class="text-blue-600 hover:underline mb-4 inline-block font-medium transition-colors">
                <i class="fa-solid fa-arrow-left mr-1"></i> Volver al catálogo
            </a>
            
            <header class="mb-8 mt-2">
                <h1 class="text-3xl font-bold text-[#0B2A4A]"><i class="fa-solid fa-book-bookmark mr-2"></i> Editar Carrera</h1>
                <p class="text-slate-500 mt-2">Modifica los detalles del programa educativo.</p>
            </header>

            <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                <form th:action="@{/coordinador/carreras/actualizar}" method="POST" class="space-y-6">
                    <input type="hidden" name="idCarrera" th:value="${carrera.idCarrera}">
                    
                    <div>
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Clave Oficial <span class="text-red-500">*</span></label>
                        <input type="text" name="clave" th:value="${carrera.claveOficial}" required class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-[#0B2A4A]">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Nombre de la Carrera <span class="text-red-500">*</span></label>
                        <input type="text" name="nombre" th:value="${carrera.nombreCarrera}" required class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-[#0B2A4A]">
                    </div>
                    
                    <div class="flex justify-end gap-4 pt-6 mt-6 border-t border-slate-100">
                        <a th:href="@{/coordinador/carreras}" class="px-6 py-3 text-slate-500 font-medium hover:text-slate-700 transition-colors">Cancelar</a>
                        <button type="submit" class="bg-[#0B2A4A] text-white px-8 py-3 rounded-lg font-bold shadow-md hover:bg-[#1a3a5a] transition-colors flex items-center">
                            <i class="fa-solid fa-save mr-2"></i> Actualizar
                        </button>
                    </div>
                </form>
            </div>
        </div>
        <div th:replace="~{fragments/layout :: footer}"></div>
    </main>
</body>
</html>
