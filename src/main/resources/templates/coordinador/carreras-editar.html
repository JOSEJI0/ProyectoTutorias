<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Editar Carrera')}"></th:block>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <div class="flex min-h-screen">
        <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

        <main class="flex-1 flex flex-col min-w-0">
            
            <header class="bg-white border-b border-slate-200 p-4 px-10 sticky top-0 z-30">
                <div class="flex items-center gap-2 text-xs font-bold text-slate-400 uppercase tracking-widest">
                    <a th:href="@{/coordinador/panel}" class="hover:text-blue-600 transition-colors">Panel</a>
                    <i class="fa-solid fa-chevron-right text-[8px]"></i>
                    <a th:href="@{/coordinador/carreras}" class="hover:text-blue-600 transition-colors">Carreras</a>
                    <i class="fa-solid fa-chevron-right text-[8px]"></i>
                    <span class="text-[#0B172A]">Editar Programa</span>
                </div>
            </header>

            <div class="p-10 max-w-2xl mx-auto w-full">
                
                <div class="mb-8">
                    <a th:href="@{/coordinador/carreras}" class="group inline-flex items-center gap-2 text-slate-400 hover:text-[#0B172A] font-black text-[10px] uppercase tracking-[0.2em] transition-all">
                        <i class="fa-solid fa-arrow-left-long transition-transform group-hover:-translate-x-1"></i> 
                        Volver al Catálogo
                    </a>
                </div>

                <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden">
                    
                    <div class="bg-[#0B172A] p-8 text-white relative overflow-hidden">
                        <div class="relative z-10 flex items-center gap-4">
                            <div class="w-12 h-12 bg-blue-500 rounded-2xl flex items-center justify-center shadow-lg">
                                <i class="fa-solid fa-pen-to-square text-white"></i>
                            </div>
                            <div>
                                <h1 class="text-2xl font-black tracking-tight">Editar Carrera</h1>
                                <p class="text-slate-400 text-xs">Modifica la información oficial del programa.</p>
                            </div>
                        </div>
                        <i class="fa-solid fa-graduation-cap absolute -right-4 -bottom-4 text-white/5 text-7xl"></i>
                    </div>

                    <form th:action="@{/coordinador/carreras/actualizar}" method="POST" class="p-8 space-y-6">
                        <input type="hidden" name="idCarrera" th:value="${carrera.idCarrera}">
                        
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 px-1">Clave Oficial *</label>
                            <input type="text" name="clave" th:value="${carrera.claveOficial}" required
                                   class="w-full bg-slate-50 border border-slate-200 rounded-xl px-5 py-4 outline-none focus:ring-2 focus:ring-blue-500 font-mono font-bold text-blue-600 transition-all"
                                   placeholder="Ej. IINF-2010-220">
                        </div>

                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 px-1">Nombre del Programa Educativo *</label>
                            <input type="text" name="nombre" th:value="${carrera.nombreCarrera}" required
                                   class="w-full bg-slate-50 border border-slate-200 rounded-xl px-5 py-4 outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-700 transition-all"
                                   placeholder="Ej. Ingeniería en Sistemas Computacionales">
                        </div>

                        <div class="flex items-center justify-end gap-6 pt-6 border-t border-slate-50">
                            <a th:href="@{/coordinador/carreras}" 
                               class="text-xs font-black text-slate-400 uppercase tracking-widest hover:text-red-500 transition-colors">
                                Cancelar
                            </a>
                            <button type="submit" 
                                    class="bg-amber-400 text-[#0B172A] px-10 py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl shadow-amber-200/50 hover:bg-amber-500 hover:-translate-y-1 transition-all flex items-center gap-2">
                                <i class="fa-solid fa-floppy-disk"></i> Guardar Cambios
                            </button>
                        </div>
                    </form>
                </div>

                <div th:replace="~{fragments/layout :: footer}"></div>
            </div>
        </main>
    </div>

</body>
</html>
