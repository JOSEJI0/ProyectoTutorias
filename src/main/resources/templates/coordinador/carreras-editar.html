<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Editar Carrera')}"></th:block>
</head>
<body>

    <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

    <main>
        <section>
            <a th:href="@{/coordinador/carreras}">Volver al catálogo</a>
            
            <header>
                <h1>Editar Carrera</h1>
                <p>Modifica los detalles del programa educativo.</p>
            </header>

            <form th:action="@{/coordinador/carreras/actualizar}" method="POST">
                <!-- Campo oculto para el ID de la carrera[cite: 4] -->
                <input type="hidden" name="idCarrera" th:value="${carrera.idCarrera}">
                
                <div>
                    <label>Clave Oficial *</label>
                    <br>
                    <input type="text" name="clave" th:value="${carrera.claveOficial}" required>
                </div>

                <br>

                <div>
                    <label>Nombre de la Carrera *</label>
                    <br>
                    <input type="text" name="nombre" th:value="${carrera.nombreCarrera}" required>
                </div>
                
                <br>

                <div>
                    <a th:href="@{/coordinador/carreras}">Cancelar</a>
                    <button type="submit">Actualizar</button>
                </div>
            </form>
        </section>

        <div th:replace="~{fragments/layout :: footer}"></div>
    </main>
</body>
</html>
