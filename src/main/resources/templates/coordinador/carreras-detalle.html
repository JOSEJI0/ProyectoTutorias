<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <!-- Mantiene el fragmento de encabezado del layout base[cite: 1, 4] -->
    <th:block th:replace="~{fragments/layout :: encabezado('Detalle de Carrera')}"></th:block>
</head>
<body>

    <!-- Mantiene la navegación lateral[cite: 1, 4] -->
    <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

    <main>
        <div>
            <!-- Información General de la Carrera[cite: 4] -->
            <header>
                <h1 th:text="${carrera.nombreCarrera}">Nombre de la Carrera</h1>
                <p th:text="'Clave Oficial: ' + ${carrera.claveOficial}">Clave</p>
                <a th:href="@{/coordinador/carreras}">Volver al Listado</a>
            </header>

            <section>
                <div>
                    <p>Clave de la Carrera</p>
                    <h3 th:text="${carrera.claveOficial}">CLAVE</h3>
                </div>
                <div>
                    <p>Alumnos Registrados</p>
                    <h3 th:text="${#lists.size(estudiantes)}">0</h3>
                </div>
            </section>

            <!-- Tabla de Estudiantes Inscritos[cite: 4] -->
            <section>
                <h2>Estudiantes Inscritos</h2>
                
                <table>
                    <thead>
                        <tr>
                            <th>No. Control</th>
                            <th>Nombre Completo</th>
                            <th>Semestre</th>
                            <th>Estatus</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="e : ${estudiantes}">
                            <td th:text="${e.numeroControl}"></td>
                            <td th:text="${e.usuario.nombre + ' ' + e.usuario.apellidos}"></td>
                            <td th:text="${e.semestreActual + '°'}"></td>
                            <td>
                                <!-- Lógica de estatus de asignación[cite: 4] -->
                                <span th:if="${e.grupo != null}">Asignado</span>
                                <span th:if="${e.grupo == null}">Sin Grupo</span>
                            </td>
                            <td>
                                <a th:href="@{/coordinador/estudiantes/editar/{id}(id=${e.idEstudiante})}">Ver/Editar</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(estudiantes)}">
                            <td colspan="5">No hay estudiantes registrados en esta carrera actualmente.</td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </div>

        <!-- Mantiene el pie de página del layout[cite: 1, 4] -->
        <div th:replace="~{fragments/layout :: footer}"></div>
    </main>
</body>
</html>
