<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Detalle de Carrera')}"></th:block>
</head>
<body class="bg-[#EDF1F4] min-h-screen flex font-sans text-slate-800">

    <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

    <main class="flex-1 p-10 overflow-y-auto flex flex-col">
        <div class="max-w-6xl mx-auto w-full flex-1">
            
            <div class="flex justify-between items-center mb-8 mt-2">
                <div>
                    <h1 class="text-3xl font-bold text-[#0B2A4A]" th:text="${carrera.nombreCarrera}">Nombre de la Carrera</h1>
                    <p class="text-[#689BBE] font-medium" th:text="'Clave Oficial: ' + ${carrera.claveOficial}">Clave</p>
                </div>
                <a th:href="@{/coordinador/carreras}" class="px-6 py-2 bg-white text-[#2A4F73] rounded-full shadow-sm hover:bg-gray-50 transition-all font-bold">
                    <i class="fa-solid fa-arrow-left mr-2"></i> Volver al Listado
                </a>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-white flex items-center gap-4">
                    <div class="bg-blue-100 text-blue-600 p-4 rounded-full">
                        <i class="fa-solid fa-book-bookmark text-2xl"></i>
                    </div>
                    <div>
                        <p class="text-sm uppercase tracking-wider text-slate-400 font-bold mb-1">Clave de la Carrera</p>
                        <h3 class="text-2xl font-bold text-[#2A4F73]" th:text="${carrera.claveOficial}">CLAVE</h3>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-white flex items-center gap-4">
                    <div class="bg-emerald-100 text-emerald-600 p-4 rounded-full">
                        <i class="fa-solid fa-users text-2xl"></i>
                    </div>
                    <div>
                        <p class="text-sm uppercase tracking-wider text-slate-400 font-bold mb-1">Alumnos Registrados</p>
                        <h3 class="text-2xl font-bold text-[#2A4F73]" th:text="${#lists.size(estudiantes)}">0</h3>
                    </div>
                </div>
            </div>

            <div class="bg-white p-8 rounded-3xl shadow-sm">
                <h2 class="text-2xl font-bold text-[#2A4F73] mb-6"><i class="fa-solid fa-user-graduate mr-2"></i> Estudiantes Inscritos</h2>
                
                <div class="overflow-hidden border border-slate-100 rounded-xl">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-50 text-slate-400 font-bold uppercase text-xs">
                            <tr>
                                <th class="px-6 py-4">No. Control</th>
                                <th class="px-6 py-4">Nombre Completo</th>
                                <th class="px-6 py-4 text-center">Semestre</th>
                                <th class="px-6 py-4 text-center">Estatus</th>
                                <th class="px-6 py-4 text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100">
                            <tr th:each="e : ${estudiantes}" class="hover:bg-blue-50/50 transition-colors">
                                <td class="px-6 py-4 font-mono text-slate-500" th:text="${e.numeroControl}"></td>
                                <td class="px-6 py-4 font-bold text-[#0B2A4A]" th:text="${e.usuario.nombre + ' ' + e.usuario.apellidos}"></td>
                                <td class="px-6 py-4 text-center font-medium" th:text="${e.semestreActual + '°'}"></td>
                                <td class="px-6 py-4 text-center">
                                    <span th:if="${e.grupo != null}" class="bg-emerald-100 text-emerald-700 text-xs font-bold px-3 py-1 rounded-full">Asignado</span>
                                    <span th:if="${e.grupo == null}" class="bg-yellow-100 text-yellow-700 text-xs font-bold px-3 py-1 rounded-full">Sin Grupo</span>
                                </td>
                                <td class="px-6 py-4 text-center">
                                    <a th:href="@{/coordinador/estudiantes/editar/{id}(id=${e.idEstudiante})}" title="Ver Estudiante" class="text-blue-500 hover:text-blue-700">
                                        <i class="fa-solid fa-user-pen text-lg"></i>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(estudiantes)}">
                                <td colspan="5" class="px-6 py-10 text-center text-slate-400 italic">No hay estudiantes registrados en esta carrera actualmente.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
        <div th:replace="~{fragments/layout :: footer}"></div>
    </main>
</body>
</html>
