<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Expediente Carrera')}"></th:block>
</head>
<body class="bg-[#F1F5F9] min-h-screen flex font-sans text-slate-900">

    <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

    <main class="flex-1 overflow-y-auto p-6 lg:p-12">
        <div class="max-w-5xl mx-auto">
            
            <!-- Encabezado de Identidad -->
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-12">
                <div>
                    <span class="text-[10px] font-black text-blue-600 uppercase tracking-[0.2em] mb-2 block">Programa Académico</span>
                    <h1 class="text-3xl font-black tracking-tighter text-slate-800 uppercase" th:text="${carrera.nombreCarrera}">CARRERA</h1>
                    <div class="flex items-center gap-2 mt-2">
                        <code class="text-xs bg-white border border-slate-200 px-2 py-1 rounded text-slate-500 font-bold" th:text="${carrera.claveOficial}">ID-00</code>
                        <span class="text-slate-400 text-xs">|</span>
                        <span class="text-slate-400 text-xs font-medium">Vigencia Institucional</span>
                    </div>
                </div>
                <a th:href="@{/coordinador/carreras}" class="inline-flex items-center gap-2 text-xs font-black uppercase tracking-widest text-slate-400 hover:text-slate-900 transition-colors">
                    <i class="fa-solid fa-chevron-left text-[10px]"></i> Listado General
                </a>
            </div>

            <!-- Resumen Estadístico (Estilo Plano) -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-10">
                <div class="bg-white border border-slate-200 p-6 rounded-xl flex justify-between items-center">
                    <div>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Estatus del Programa</p>
                        <h3 class="text-xl font-bold text-slate-800">Activo</h3>
                    </div>
                    <div class="w-10 h-10 bg-slate-50 rounded-lg flex items-center justify-center text-slate-300">
                        <i class="fa-solid fa-shield-check"></i>
                    </div>
                </div>
                <div class="bg-white border border-slate-200 p-6 rounded-xl flex justify-between items-center">
                    <div>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Población Total</p>
                        <h3 class="text-xl font-bold text-slate-800" th:text="${#lists.size(estudiantes)} + ' Alumnos'">0</h3>
                    </div>
                    <div class="w-10 h-10 bg-slate-50 rounded-lg flex items-center justify-center text-slate-300">
                        <i class="fa-solid fa-user-group"></i>
                    </div>
                </div>
            </div>

            <!-- Listado de Estudiantes (Tabla Profesional) -->
            <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden">
                <div class="px-8 py-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                    <h2 class="font-black text-sm uppercase tracking-tight text-slate-700">Relación de Alumnos Inscritos</h2>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-slate-50 text-slate-500 font-bold border-b border-slate-200 text-left">
                            <tr>
                                <th class="px-8 py-4 font-semibold uppercase text-[10px] tracking-widest">Matrícula</th>
                                <th class="px-8 py-4 font-semibold uppercase text-[10px] tracking-widest">Nombre del Alumno</th>
                                <th class="px-8 py-4 font-semibold text-center uppercase text-[10px] tracking-widest">Grado</th>
                                <th class="px-8 py-4 font-semibold text-center uppercase text-[10px] tracking-widest">Vínculo</th>
                                <th class="px-8 py-4"></th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100">
                            <tr th:each="e : ${estudiantes}" class="hover:bg-blue-50/30 transition-colors group">
                                <td class="px-8 py-4 font-mono text-xs text-slate-400" th:text="${e.numeroControl}">CONTROL</td>
                                <td class="px-8 py-4 font-bold text-slate-700" th:text="${e.usuario.nombre + ' ' + e.usuario.apellidos}">NOMBRE</td>
                                <td class="px-8 py-4 text-center">
                                    <span class="text-slate-600 font-medium" th:text="${e.semestreActual} + '° Semestre'"></span>
                                </td>
                                <td class="px-8 py-4 text-center">
                                    <span th:if="${e.grupo != null}" class="text-[10px] font-black text-emerald-600 bg-emerald-50 px-2 py-1 rounded uppercase tracking-tighter">Asignado</span>
                                    <span th:if="${e.grupo == null}" class="text-[10px] font-black text-orange-600 bg-orange-50 px-2 py-1 rounded uppercase tracking-tighter">Pendiente</span>
                                </td>
                                <td class="px-8 py-4 text-right">
                                    <a th:href="@{/coordinador/estudiantes/editar/{id}(id=${e.idEstudiante})}" 
                                       class="p-2 text-slate-300 hover:text-blue-600 transition-colors opacity-0 group-hover:opacity-100">
                                        <i class="fa-solid fa-arrow-right-to-line"></i>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(estudiantes)}">
                                <td colspan="5" class="px-8 py-16 text-center text-slate-400 italic font-medium">
                                    No se encontraron registros vinculados a este programa académico.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
        <div th:replace="~{fragments/layout :: footer}"></div>
    </main>
</body>
</html>
