<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <!-- Mantenemos el encabezado dinámico según el estado de edición -->
    <th:block th:replace="~{fragments/layout :: encabezado(${esEdicion} ? 'Editar Grupo' : 'Crear Grupo')}"></th:block>
</head>
<body>

    <!-- Sidebar de navegación institucional[cite: 1] -->
    <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

    <main>
        <section>
            <a th:href="@{/coordinador/grupos}">Volver al Listado</a>
            
            <header>
                <!-- Título dinámico basado en la variable esEdicion -->
                <h1 th:text="${esEdicion} ? 'Editar Grupo de Tutoría' : 'Aperturar Grupo de Tutoría'"></h1>
                <p>Configura los detalles del grupo académico.</p>
            </header>

            <form th:action="@{/coordinador/grupos/guardar}" th:object="${nuevoGrupo}" method="POST">
                
                <!-- Campos ocultos para integridad de la base de datos[cite: 4, 7] -->
                <input type="hidden" th:field="*{idGrupo}">
                <input type="hidden" th:field="*{activo}">

                <fieldset>
                    <legend>Datos del Grupo</legend>

                    <!-- Identificador/Nombre del grupo -->
                    <label>Nombre del Grupo (Clave)</label>
                    <br>
                    <input type="text" th:field="*{nombreGrupo}" placeholder="Ej. 1A-SISC" required>

                    <br><br>

                    <!-- Asociación con Carrera -->
                    <label>Carrera Asignada</label>
                    <br>
                    <select th:field="*{carrera.idCarrera}" required>
                        <option value="" disabled selected>Selecciona la carrera...</option>
                        <option th:each="c : ${carreras}" 
                                th:value="${c.idCarrera}" 
                                th:text="${c.nombreCarrera}">Ingeniería</option>
                    </select>

                    <br><br>

                    <!-- Selección de Semestre[cite: 4, 8] -->
                    <label>Semestre Permitido</label>
                    <br>
                    <select th:field="*{semestre}" required>
                        <option value="" disabled selected>Selecciona...</option>
                        <option value="1">1° Semestre</option>
                        <option value="2">2° Semestre</option>
                        <option value="3">3° Semestre</option>
                        <option value="4">4° Semestre</option>
                        <option value="5">5° Semestre</option>
                        <option value="6">6° Semestre</option>
                        <option value="7">7° Semestre</option>
                        <option value="8">8° Semestre</option>
                        <option value="9">9° Semestre</option>
                    </select>

                    <br><br>

                    <!-- Horario de la sesión de tutoría[cite: 4] -->
                    <label>Horario de Sesión</label>
                    <br>
                    <input type="text" th:field="*{horario}" placeholder="Ej. Lunes 10:00 - 11:00" required>

                    <br><br>

                    <!-- Asignación del Tutor responsable[cite: 4, 7] -->
                    <label>Docente Tutor</label>
                    <br>
                    <select th:field="*{tutor.idTutor}" required>
                        <option value="" disabled selected>Selecciona al docente...</option>
                        <option th:each="t : ${tutores}" 
                                th:value="${t.idTutor}" 
                                th:text="${t.usuario.nombre + ' ' + t.usuario.apellidos}">Nombre del Tutor</option>
                    </select>
                </fieldset>

                <br>

                <div>
                    <button type="submit">
                        <span th:text="${esEdicion} ? 'Actualizar Cambios' : 'Crear Grupo'"></span>
                    </button>
                </div>

            </form>
        </section>
        
        <div th:replace="~{fragments/layout :: footer}"></div>
    </main>
</body>
</html>
