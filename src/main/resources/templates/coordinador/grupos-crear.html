<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado(${esEdicion} ? 'Editar Grupo' : 'Crear Grupo')}"></th:block>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <div class="flex min-h-screen">
        <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

        <main class="flex-1 flex flex-col min-w-0">
            
            <div class="p-10 max-w-4xl mx-auto w-full">
                
                <a th:href="@{/coordinador/grupos}" class="text-blue-600 text-sm font-bold flex items-center gap-2 mb-6 hover:underline">
                    <i class="fa-solid fa-arrow-left"></i> Volver al Listado
                </a>

                <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden">
                    
                    <div class="bg-[#0B172A] p-8 text-white">
                        <h1 class="text-2xl font-black tracking-tight" 
                            th:text="${esEdicion} ? 'Editar Grupo de Tutoría' : 'Aperturar Nuevo Grupo'"></h1>
                        <p class="text-slate-400 text-sm">Configura los detalles básicos del grupo académico.</p>
                    </div>

                    <form th:action="@{/coordinador/grupos/guardar}" th:object="${nuevoGrupo}" method="POST" class="p-8 space-y-6">
                        
                        <input type="hidden" th:field="*{idGrupo}">
                        <input type="hidden" th:field="*{activo}">

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            
                            <div class="md:col-span-2">
                                <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Nombre del Grupo (Clave)</label>
                                <input type="text" th:field="*{nombreGrupo}" placeholder="Ej. 1A-SISC" required 
                                       class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none font-bold">
                            </div>

                            <div>
                                <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Carrera Asignada</label>
                                <select th:field="*{carrera.idCarrera}" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none font-bold">
                                    <option value="" disabled selected>Selecciona la carrera...</option>
                                    <option th:each="c : ${carreras}" th:value="${c.idCarrera}" th:text="${c.nombreCarrera}">Carrera</option>
                                </select>
                            </div>

                            <div>
                                <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Semestre</label>
                                <select th:field="*{semestre}" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none font-bold">
                                    <option value="" disabled selected>Selecciona...</option>
                                    <option th:each="i : ${#numbers.sequence(1, 9)}" th:value="${i}" th:text="${i + '° Semestre'}"></option>
                                </select>
                            </div>

                            <div>
                                <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Horario de Sesión</label>
                                <input type="text" th:field="*{horario}" placeholder="Ej. Lunes 10:00 - 11:00" required 
                                       class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none font-bold">
                            </div>

                            <div>
                                <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Docente Tutor</label>
                                <select th:field="*{tutor.idTutor}" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none font-bold">
                                    <option value="" disabled selected>Selecciona al docente...</option>
                                    <option th:each="t : ${tutores}" th:value="${t.idTutor}" th:text="${t.usuario.nombre + ' ' + t.usuario.apellidos}">Tutor</option>
                                </select>
                            </div>

                        </div>

                        <div class="pt-6 flex justify-end">
                            <button type="submit" class="bg-amber-400 text-[#0B172A] px-10 py-4 rounded-xl font-black text-xs uppercase tracking-widest shadow-lg shadow-amber-100 hover:bg-amber-500 transition-all">
                                <span th:text="${esEdicion} ? 'Actualizar Cambios' : 'Crear Grupo'"></span>
                            </button>
                        </div>

                    </form>
                </div>

                <div th:replace="~{fragments/layout :: footer}"></div>
            </div>
        </main>
    </div>

</body>
</html>
