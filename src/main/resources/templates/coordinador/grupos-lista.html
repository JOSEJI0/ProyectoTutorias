<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
<th:block
	th:replace="~{fragments/layout :: encabezado('Gestión de Grupos')}"></th:block>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

	<div class="flex min-h-screen">
		<div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

		<main
			class="flex-1 flex flex-col min-w-0 h-screen overflow-y-auto custom-scrollbar">

			<header
				class="bg-white border-b border-slate-200 p-6 sticky top-0 z-30">
				<div
					class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
					<div>
						<h1 class="text-2xl font-black text-[#0B172A] tracking-tight">Gestión
							de Grupos</h1>
						<p
							class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Administración
							de Secciones de Tutoría</p>
					</div>

					<div class="flex bg-slate-100 p-1 rounded-xl">
						<a th:href="@{/coordinador/grupos(activos=true)}"
							class="px-4 py-2 text-xs font-black uppercase tracking-tighter rounded-lg transition-all"
							th:classappend="${param.activos == null || param.activos[0] == 'true' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400 hover:text-slate-600'}">
							Semestre Actual </a> <a
							th:href="@{/coordinador/grupos(activos=false)}"
							class="px-4 py-2 text-xs font-black uppercase tracking-tighter rounded-lg transition-all"
							th:classappend="${param.activos != null && param.activos[0] == 'false' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400 hover:text-slate-600'}">
							Historial </a>
					</div>
				</div>
			</header>

			<div class="p-8 max-w-7xl mx-auto w-full space-y-8">

				<div th:if="${param.exito != null}"
					class="bg-emerald-50 border border-emerald-100 text-emerald-700 px-6 py-3 rounded-2xl text-sm font-bold animate-fade-in">
					<i class="fa-solid fa-circle-check mr-2"></i> Operación realizada
					con éxito.
				</div>
				<div th:if="${param.error != null}"
					class="bg-red-50 border border-red-100 text-red-700 px-6 py-3 rounded-2xl text-sm font-bold">
					<i class="fa-solid fa-circle-exclamation mr-2"></i> <span
						th:text="${param.error}"></span>
				</div>

				<div class="flex justify-end">
					<a th:href="@{/coordinador/grupos/nuevo}"
						class="bg-amber-400 text-[#0B172A] px-6 py-3 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-amber-200 hover:bg-amber-500 transition-all flex items-center gap-2">
						<i class="fa-solid fa-plus-circle"></i> Aperturar Grupo
					</a> <a th:href="@{/coordinador/asignaciones}"
						class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-blue-200 hover:bg-[#0B172A] transition-all flex items-center gap-2">
						<i class="fa-solid fa-user-plus"></i> Asignar Alumnos
					</a>
				</div>

				<div
					class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden">
					<div class="overflow-x-auto">
						<table class="w-full text-left border-collapse">
							<thead>
								<tr class="bg-slate-50 border-b border-slate-200">
									<th
										class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Grupo
										/ Clave</th>
									<th
										class="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Tutor
										Asignado</th>
									<th
										class="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Alumnos</th>
									<th
										class="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Acciones</th>
								</tr>
							</thead>
							<tbody class="divide-y divide-slate-100">
								<tr th:each="g : ${grupos}"
									class="hover:bg-blue-50/20 transition-colors group">
									<td class="px-8 py-5">
										<p class="font-black text-[#0B172A] text-sm"
											th:text="${g.nombreGrupo}"></p>
										<p class="text-[10px] text-slate-400 font-bold uppercase"
											th:text="${g.carrera.nombreCarrera}"></p>
									</td>
									<td class="px-6 py-5">
										<div class="flex items-center gap-3">
											<div
												class="w-8 h-8 rounded-lg bg-blue-50 text-blue-600 flex items-center justify-center text-xs">
												<i class="fa-solid fa-chalkboard-user"></i>
											</div>
											<span class="text-sm font-bold text-slate-700"
												th:text="${g.tutor.usuario.nombre + ' ' + g.tutor.usuario.apellidos}"></span>
										</div>
									</td>
									<td class="px-6 py-5 text-center"><span
										class="bg-emerald-50 text-emerald-700 text-[10px] font-black px-3 py-1 rounded-full border border-emerald-100"
										th:text="${#lists.size(g.estudiantes)} + ' Inscritos'"></span>
									</td>
									<td class="px-8 py-5 text-right">
										<div class="flex justify-end gap-2">
											<a
												th:href="@{/coordinador/grupo/{id}/detalle(id=${g.idGrupo})}"
												class="p-2 text-blue-600 hover:bg-blue-600 hover:text-white rounded-xl transition-all"
												title="Detalles"> <i class="fa-solid fa-eye text-xs"></i>
											</a> <a
												th:href="@{/coordinador/grupos/editar/{id}(id=${g.idGrupo})}"
												class="p-2 text-amber-600 hover:bg-amber-500 hover:text-white rounded-xl transition-all"
												title="Editar"> <i
												class="fa-solid fa-pen-to-square text-xs"></i>
											</a> <a
												th:href="@{/coordinador/grupos/eliminar/{id}(id=${g.idGrupo})}"
												onclick="return confirm('¿Estás seguro de eliminar este grupo?');"
												class="p-2 text-red-500 hover:bg-red-500 hover:text-white rounded-xl transition-all"
												title="Eliminar"> <i
												class="fa-solid fa-trash-can text-xs"></i>
											</a>
										</div>
									</td>
								</tr>
								<tr th:if="${#lists.isEmpty(grupos)}">
									<td colspan="4" class="px-8 py-20 text-center"><i
										class="fa-solid fa-layer-group text-4xl text-slate-200 mb-4 block"></i>
										<p class="text-slate-400 font-bold italic text-sm">No se
											encontraron grupos para este periodo o filtro.</p></td>
								</tr>
							</tbody>
						</table>
					</div>
				</div>

				<div th:replace="~{fragments/layout :: footer}"></div>
			</div>
		</main>
	</div>

</body>
</html>
