<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Gestión de Grupos')}"></th:block>
</head>
<body>

    <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

    <main>
        <section>
            <header>
                <h1>Gestión de Grupos</h1>
                <!-- Enlace para crear un nuevo grupo -->
                <a th:href="@{/coordinador/grupos/nuevo}">Crear Grupo</a>
            </header>

            <!-- Mensajes de retroalimentación -->
            <div th:if="${param.exito != null}">Operación exitosa.</div>
            <div th:if="${param.error != null}" th:text="${param.error}">Error en la operación.</div>

            <br>

            <!-- Filtros de estado (Activos/Historial) -->
            <nav>
                <a th:href="@{/coordinador/grupos(activos=true)}">Semestre Actual</a> | 
                <a th:href="@{/coordinador/grupos(activos=false)}">Historial (Cerrados)</a>
            </nav>

            <br>

            <!-- Tabla de administración de grupos -->
            <table>
                <thead>
                    <tr>
                        <th>Grupo</th>
                        <th>Tutor Asignado</th>
                        <th>Carrera</th>
                        <th>Alumnos</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="g : ${grupos}">
                        <td th:text="${g.nombreGrupo}"></td>
                        <td th:text="${g.tutor.usuario.nombre + ' ' + g.tutor.usuario.apellidos}"></td>
                        <td th:text="${g.carrera.nombreCarrera}"></td>
                        
                        <!-- Conteo de estudiantes asignados al grupo[cite: 4, 7] -->
                        <td th:text="${#lists.size(g.estudiantes)}">0</td>
                        
                        <td>
                            <!-- Acciones operativas[cite: 4] -->
                            <a th:href="@{/coordinador/grupos/editar/{id}(id=${g.idGrupo})}">Editar</a> | 
                            <a th:href="@{/coordinador/grupo/{id}/detalle(id=${g.idGrupo})}">Ver Detalles</a> | 
                            <a th:href="@{/coordinador/grupos/eliminar/{id}(id=${g.idGrupo})}" 
                               onclick="return confirm('¿Estás seguro de eliminar este grupo?');">Eliminar</a>
                        </td>
                    </tr>
                    <!-- Manejo de lista vacía[cite: 4] -->
                    <tr th:if="${#lists.isEmpty(grupos)}">
                        <td colspan="5">No se encontraron grupos para este periodo.</td>
                    </tr>
                </tbody>
            </table>
        </section>
        
        <div th:replace="~{fragments/layout :: footer}"></div>
    </main>
</body>
</html>
