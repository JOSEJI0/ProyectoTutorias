<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <!-- Mantiene el fragmento de encabezado reutilizable[cite: 1, 4] -->
    <th:block th:replace="~{fragments/layout :: encabezado('Historial de Alumno')}"></th:block>
</head>
<body>

    <!-- Mantiene la navegación lateral del coordinador[cite: 1, 4] -->
    <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

    <main>
        <section>
            <a th:href="@{/coordinador/busquedas}">Volver a Búsquedas</a>
            
            <!-- Título dinámico con el ID del estudiante consultado -->
            <h2 th:text="'Historial Académico del Alumno ID: ' + ${estudianteId}"></h2>
            
            <!-- Mensaje si el alumno no posee registros en la base de datos -->
            <div th:if="${#lists.isEmpty(resultados)}">
                Este alumno no tiene historial de tutorías registrado.
            </div>

            <!-- Listado de grupos en los que ha estado inscrito el alumno -->
            <div>
                <div th:each="g : ${resultados}">
                    <hr>
                    <!-- Nombre del grupo de tutoría -->
                    <h3 th:text="${g.nombreGrupo}"></h3>
                    
                    <!-- Nombre del periodo escolar correspondiente -->
                    <p th:text="${g.periodo.nombrePeriodo}"></p>
                    
                    <!-- Datos del tutor asignado en ese periodo[cite: 4] -->
                    <p th:text="'Tutor: ' + ${g.tutor.usuario.nombre + ' ' + g.tutor.usuario.apellidos}"></p>
                    <hr>
                </div>
            </div>
        </section>
    </main>

    <!-- Mantiene el fragmento de pie de página[cite: 1, 4] -->
    <div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
