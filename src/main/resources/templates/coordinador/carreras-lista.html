<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Catálogo de Carreras')}"></th:block>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <div class="flex min-h-screen">
        <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

        <main class="flex-1 flex flex-col min-w-0 h-screen overflow-y-auto custom-scrollbar">
            
            <header class="bg-white/80 backdrop-blur-md border-b border-slate-200 p-4 px-10 sticky top-0 z-30">
                <div class="flex items-center gap-2 text-xs font-bold text-slate-400 uppercase tracking-[0.15em]">
                    <a th:href="@{/coordinador/panel}" class="hover:text-blue-600 transition-colors">Panel</a>
                    <i class="fa-solid fa-chevron-right text-[8px]"></i>
                    <span class="text-[#0B172A]">Gestión de Carreras</span>
                </div>
            </header>

            <div class="p-10 max-w-6xl mx-auto w-full">
                
                <div class="flex flex-col md:flex-row justify-between items-end mb-10 gap-4">
                    <div>
                        <h1 class="text-4xl font-black text-[#0B172A] tracking-tight">Catálogo de Carreras</h1>
                        <p class="text-slate-500 text-sm font-medium">Administra los programas educativos vigentes en la institución.</p>
                    </div>

                </div>

                <div class="bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200/60 border border-white overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-100">
                                <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest w-24">ID Interno</th>
                                <th class="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Clave Oficial</th>
                                <th class="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Nombre del Programa</th>
                                <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-50">
                            <tr th:each="c : ${carreras}" class="group hover:bg-blue-50/40 transition-colors">
                                <td class="px-8 py-6">
                                    <span class="text-xs font-bold text-slate-300" th:text="${c.idCarrera}"></span>
                                </td>
                                <td class="px-6 py-6">
                                    <span class="font-mono text-xs font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-lg" th:text="${c.claveOficial}"></span>
                                </td>
                                <td class="px-6 py-6">
                                    <span class="font-bold text-slate-700 text-sm" th:text="${c.nombreCarrera}"></span>
                                </td>
                                <td class="px-8 py-6 text-right">
                                    <div class="flex justify-end gap-3">
                                        <a th:href="@{/coordinador/carreras/detalle/{id}(id=${c.idCarrera})}" 
                                           class="w-9 h-9 rounded-xl bg-slate-100 text-slate-500 flex items-center justify-center hover:bg-[#0B172A] hover:text-white transition-all shadow-sm"
                                           title="Ver alumnos inscritos">
                                            <i class="fa-solid fa-eye text-xs"></i>
                                        </a>
                                        <a th:href="@{/coordinador/carreras/editar/{id}(id=${c.idCarrera})}" 
                                           class="w-9 h-9 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center hover:bg-blue-600 hover:text-white transition-all shadow-sm"
                                           title="Editar información">
                                            <i class="fa-solid fa-pen text-xs"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                            
                            <tr th:if="${#lists.isEmpty(carreras)}">
                                <td colspan="4" class="px-8 py-24 text-center">
                                    <div class="flex flex-col items-center gap-4">
                                        <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center text-slate-200">
                                            <i class="fa-solid fa-folder-open text-3xl"></i>
                                        </div>
                                        <p class="text-slate-400 font-bold italic text-sm">No hay carreras registradas en el catálogo institucional.</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div th:replace="~{fragments/layout :: footer}"></div>
            </div>
        </main>
    </div>

</body>
</html>
