<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Gestión de Carreras')}"></th:block>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen flex text-slate-900">

    <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-20 bg-white/50 backdrop-blur-xl flex items-center justify-between px-12 border-b border-slate-200/60">
            <div class="flex items-center gap-2 text-slate-400 text-sm">
                <i class="fa-solid fa-chevron-right text-[10px]"></i>
                <span class="text-slate-900 font-bold">Gestión de Carreras</span>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-12 custom-scrollbar">
            <div class="max-w-5xl mx-auto">
                <div class="mb-10">
                    <h1 class="text-4xl font-[800] text-slate-900 tracking-tight">Carreras</h1>
                    <p class="text-slate-500 mt-2 font-medium">Administra las carreras oficiales integradas en el sistema de tutorías.</p>
                </div>

                <div th:if="${param.error != null and param.error[0] == 'vinculado'}" 
                     class="mb-8 bg-amber-50 border-l-4 border-amber-500 p-5 rounded-r-2xl text-amber-800 shadow-sm flex items-center gap-4">
                    <div class="h-10 w-10 bg-amber-500 text-white rounded-xl flex items-center justify-center flex-shrink-0">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                    </div>
                    <p class="text-sm font-bold">No se puede eliminar la carrera: Existen alumnos o grupos vinculados a este programa.</p>
                </div>

                <div class="glass-card p-10 rounded-[2.5rem] shadow-sm border border-slate-100 mb-10">
                    <h2 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-6 px-1">Registrar Nueva Oferta</h2>
                    <form th:action="@{/coordinador/carreras/guardar}" method="POST" class="grid grid-cols-1 md:grid-cols-3 gap-6 items-end">
                        <div>
                            <label class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest block mb-2 px-1">Nombre de la Carrera</label>
                            <input type="text" name="nombre" placeholder="Ej. Ing. Civil" required 
                                   class="w-full bg-slate-100/50 border-2 border-transparent focus:border-emerald-500/20 rounded-2xl px-5 py-4 text-sm font-semibold outline-none transition-all">
                        </div>
                        <div>
                            <label class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest block mb-2 px-1">Clave Oficial</label>
                            <input type="text" name="clave" placeholder="Ej. ICIV-2010" required 
                                   class="w-full bg-slate-100/50 border-2 border-transparent focus:border-emerald-500/20 rounded-2xl px-5 py-4 text-sm font-semibold outline-none transition-all">
                        </div>
                        <button type="submit" class="bg-slate-900 hover:bg-emerald-600 text-white h-[56px] rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl shadow-slate-900/10 transition-all flex items-center justify-center gap-3">
                            Añadir Carrera <i class="fa-solid fa-plus-circle"></i>
                        </button>
                    </form>
                </div>

                <div class="glass-card rounded-[3rem] shadow-xl overflow-hidden border border-slate-100">
                    <div class="p-8 bg-gradient-to-r from-slate-50 to-white border-b border-slate-100">
                        <h3 class="text-lg font-extrabold text-slate-800">Listado</h3>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest bg-slate-50/50">
                                    <th class="py-6 px-10">Clave Oficial</th>
                                    <th class="py-6 px-10">Programa Académico</th>
                                    <th class="py-6 px-10 text-center">Acciones</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-50">
                                <tr th:each="c : ${carreras}" class="hover:bg-emerald-50/30 transition-all group">
                                    <td class="py-6 px-10">
                                        <span class="text-xs font-black px-3 py-1 bg-slate-100 rounded-lg text-slate-500 group-hover:bg-emerald-500 group-hover:text-white transition-all" 
                                              th:text="${c.claveOficial}"></span>
                                    </td>
                                    <td class="py-6 px-10">
                                        <span class="text-sm font-bold text-slate-700 group-hover:text-emerald-700 transition-colors" 
                                              th:text="${c.nombreCarrera}"></span>
                                    </td>
                                    <td class="py-6 px-10 text-center">
                                        <div class="flex items-center justify-center gap-4">
                                            <a th:href="@{/coordinador/carreras/editar/{id}(id=${c.idCarrera})}" 
                                               class="h-9 w-9 rounded-xl bg-blue-50 text-blue-500 flex items-center justify-center hover:bg-blue-500 hover:text-white transition-all shadow-sm">
                                                <i class="fa-solid fa-pen-to-square"></i>
                                            </a>
                                            <a th:href="@{/coordinador/carreras/eliminar/{id}(id=${c.idCarrera})}" 
                                               class="h-9 w-9 rounded-xl bg-red-50 text-red-500 flex items-center justify-center hover:bg-red-500 hover:text-white transition-all shadow-sm"
                                               onclick="return confirm('¿Seguro que desea eliminar esta carrera permanentemente?');">
                                                <i class="fa-solid fa-trash-can"></i>
                                            </a>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        
        <div th:replace="~{fragments/layout :: footer}"></div>
    </main>
</body>
</html>
