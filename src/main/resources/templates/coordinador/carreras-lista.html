<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <!-- Fragmento de encabezado reutilizable[cite: 1, 4] -->
    <th:block th:replace="~{fragments/layout :: encabezado('Catálogo de Carreras')}"></th:block>
</head>
<body>

    <!-- Sidebar de navegación[cite: 1, 4] -->
    <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

    <main>
        <header>
            <h1>Catálogo de Carreras</h1>
            <p>Listado de programas educativos registrados en el sistema.</p>
        </header>

        <section>
            <!-- Tabla simple de carreras -->
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Clave</th>
                        <th>Nombre de la Carrera</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${carreras}">
                        <td th:text="${c.idCarrera}"></td>
                        <td th:text="${c.claveOficial}"></td>
                        <td th:text="${c.nombreCarrera}"></td>
                        <td>
                            <!-- Enlaces de gestión operativa -->
                            <a th:href="@{/coordinador/carreras/detalle/{id}(id=${c.idCarrera})}">Ver</a> | 
                            <a th:href="@{/coordinador/carreras/editar/{id}(id=${c.idCarrera})}">Editar</a>
                        </td>
                    </tr>
                    <!-- Mensaje en caso de lista vacía -->
                    <tr th:if="${#lists.isEmpty(carreras)}">
                        <td colspan="4">No hay carreras registradas.</td>
                    </tr>
                </tbody>
            </table>
        </section>

        <!-- Pie de página reutilizable[cite: 1, 4] -->
        <div th:replace="~{fragments/layout :: footer}"></div>
    </main>
</body>
</html>
