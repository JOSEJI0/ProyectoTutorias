<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Editar Tutor')}"></th:block>
</head>
<body>

    <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

    <main>
        <section>
            <a th:href="@{/coordinador/tutores}">Volver al listado</a>
            
            <header>
                <h1>Editar Tutor</h1>
                <p>Actualiza la información personal, académica o la fotografía del docente.</p>
            </header>

            <form th:action="@{/coordinador/tutores/actualizar}" method="POST" enctype="multipart/form-data">
                <!-- Identificador único del tutor -->
                <input type="hidden" name="idTutor" th:value="${tutor.idTutor}">
                
                <!-- Gestión de Fotografía -->
                <section>
                    <div>
                        <p>Foto actual:</p>
                        <img th:src="@{'/uploads/' + ${tutor.usuario.fotoPerfil}}" alt="Foto actual" width="100">
                    </div>
                    <div>
                        <label>Cambiar Foto de Perfil</label>
                        <input type="file" name="foto" accept="image/*">
                        <p><small>Deja este campo vacío si no deseas cambiar la imagen actual.</small></p>
                    </div>
                </section>

                <hr>

                <!-- Datos del Formulario -->
                <fieldset>
                    <legend>Datos Personales y Académicos</legend>
                    
                    <div>
                        <label>RFC del Empleado *</label>
                        <input type="text" name="rfc" th:value="${tutor.rfcEmpleado}" required>
                    </div>

                    <br>

                    <div>
                        <label>Correo Institucional *</label>
                        <input type="email" name="correo" th:value="${tutor.usuario.correoInstitucional}" required>
                    </div>

                    <br>

                    <div>
                        <label>Nombre(s) *</label>
                        <input type="text" name="nombre" th:value="${tutor.usuario.nombre}" required>
                    </div>

                    <br>

                    <div>
                        <label>Apellidos *</label>
                        <input type="text" name="apellidos" th:value="${tutor.usuario.apellidos}" required>
                    </div>
                </fieldset>
                
                <br>

                <div>
                    <a th:href="@{/coordinador/tutores}">Cancelar</a>
                    <button type="submit">Guardar Cambios</button>
                </div>
            </form>
        </section>
        
        <div th:replace="~{fragments/layout :: footer}"></div>
    </main>
</body>
</html>
