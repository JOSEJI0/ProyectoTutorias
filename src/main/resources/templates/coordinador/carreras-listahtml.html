<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Actualizar Carrera')}"></th:block>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <div class="flex min-h-screen">
        <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

        <main class="flex-1 flex flex-col min-w-0 h-screen overflow-y-auto custom-scrollbar">
            
            <header class="bg-white/80 backdrop-blur-md border-b border-slate-200 p-4 px-10 sticky top-0 z-30">
                <div class="flex items-center gap-2 text-xs font-bold text-slate-400 uppercase tracking-[0.15em]">
                    <a th:href="@{/coordinador/panel}" class="hover:text-blue-600">Panel</a>
                    <i class="fa-solid fa-chevron-right text-[8px]"></i>
                    <a th:href="@{/coordinador/carreras}" class="hover:text-blue-600">Carreras</a>
                    <i class="fa-solid fa-chevron-right text-[8px]"></i>
                    <span class="text-[#0B172A]">Actualizar Registro</span>
                </div>
            </header>

            <div class="p-10 flex-1 flex flex-col items-center justify-center">
                
                <div class="max-w-2xl w-full">
                    <a th:href="@{/coordinador/carreras}" class="group inline-flex items-center gap-2 text-slate-400 hover:text-[#0B172A] font-black text-[10px] uppercase tracking-[0.2em] mb-8 transition-all">
                        <i class="fa-solid fa-arrow-left-long transition-transform group-hover:-translate-x-1"></i> 
                        Volver al Catálogo
                    </a>

                    <div class="mb-10 flex flex-col md:flex-row items-center gap-6 text-center md:text-left">
                        <div class="h-16 w-16 bg-[#0B172A] rounded-2xl shadow-xl flex items-center justify-center text-amber-400 shrink-0">
                            <i class="fa-solid fa-pen-nib text-2xl"></i>
                        </div>
                        <div>
                            <h1 class="text-3xl font-black text-slate-900 tracking-tight">Editar Carrera</h1>
                            <p class="text-slate-500 mt-1 text-sm font-medium">Modifica los datos técnicos del programa educativo.</p>
                        </div>
                    </div>

                    <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl shadow-slate-200/60 border border-white relative overflow-hidden">
                        <form th:action="@{/coordinador/carreras/actualizar}" method="POST" class="space-y-8 relative z-10">
                            
                            <input type="hidden" name="idCarrera" th:value="${carrera.idCarrera}">

                            <div class="space-y-6">
                                <div>
                                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-3 px-1">Nombre Completo del Programa</label>
                                    <input type="text" name="nombre" th:value="${carrera.nombreCarrera}" required 
                                           class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-6 py-4 text-sm font-bold text-slate-700 outline-none transition-all focus:ring-2 focus:ring-amber-400 focus:bg-white"
                                           placeholder="Ej. Ingeniería en Sistemas Computacionales">
                                </div>

                                <div>
                                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-3 px-1">Clave de Registro Oficial</label>
                                    <input type="text" name="clave" th:value="${carrera.claveOficial}" required 
                                           class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-6 py-4 text-sm font-mono font-bold text-blue-600 outline-none transition-all uppercase focus:ring-2 focus:ring-amber-400 focus:bg-white"
                                           placeholder="Ej. ISIC-2010-224">
                                </div>
                            </div>

                            <div class="flex flex-col md:flex-row items-center gap-4 pt-6">
                                <button type="submit" class="w-full md:w-auto bg-[#0B172A] hover:bg-slate-800 text-white px-10 py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl shadow-slate-900/20 transition-all flex items-center justify-center gap-3 group">
                                    Guardar Cambios 
                                    <i class="fa-solid fa-circle-check text-amber-400 transition-transform group-hover:scale-110"></i>
                                </button>
                                <a th:href="@{/coordinador/carreras}" class="w-full md:w-auto text-center px-10 py-5 text-slate-400 hover:text-red-500 font-black text-[10px] uppercase tracking-widest transition-colors">
                                    Cancelar
                                </a>
                            </div>
                        </form>
                        
                        <i class="fa-solid fa-graduation-cap absolute -right-6 -bottom-6 text-slate-50 text-9xl"></i>
                    </div>
                </div>

                <div th:replace="~{fragments/layout :: footer}"></div>
            </div>
        </main>
    </div>

</body>
</html>
