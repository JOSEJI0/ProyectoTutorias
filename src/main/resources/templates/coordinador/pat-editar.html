<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Editar PAT Institucional')}"></th:block>
</head>
<body class="bg-slate-50 min-h-screen flex font-sans text-slate-800">

    <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

    <main class="flex-1 p-10 overflow-y-auto flex flex-col">
        <div class="max-w-3xl mx-auto w-full flex-1">
            <a th:href="@{/coordinador/pat}" class="text-blue-600 hover:underline mb-4 inline-block font-medium">&larr; Volver al catálogo</a>
            
            <header class="mb-8 mt-2">
                <h1 class="text-3xl font-bold text-[#0B2A4A]"><i class="fa-solid fa-pen-to-square mr-2"></i> Editar Plan Institucional</h1>
                <p class="text-slate-500 mt-2">Modifica la carrera, periodo o versión del temario base.</p>
            </header>

            <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                <form th:action="@{/coordinador/pat/actualizar}" method="POST" class="space-y-6">
                    <input type="hidden" name="idPat" th:value="${pat.idPat}">
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Periodo Escolar <span class="text-red-500">*</span></label>
                            <select name="idPeriodo" required class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-[#0B2A4A]">
                                <option th:each="p : ${periodos}" 
                                        th:value="${p.idPeriodo}" 
                                        th:text="${p.nombrePeriodo}"
                                        th:selected="${p.idPeriodo == pat.periodo.idPeriodo}"></option>
                            </select>
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Carrera Asignada <span class="text-red-500">*</span></label>
                            <select name="idCarrera" required class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-[#0B2A4A]">
                                <option th:each="c : ${carreras}" 
                                        th:value="${c.idCarrera}" 
                                        th:text="${c.nombreCarrera}"
                                        th:selected="${c.idCarrera == pat.carrera.idCarrera}"></option>
                            </select>
                        </div>
                        <div class="md:col-span-2">
                            <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Versión <span class="text-red-500">*</span></label>
                            <input type="text" name="version" th:value="${pat.version}" required class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-[#0B2A4A]">
                        </div>
                    </div>
                    
                    <div class="pt-6 border-t border-slate-100 flex justify-end">
                        <button type="submit" class="bg-[#0B2A4A] text-white px-8 py-3 rounded-lg font-bold shadow-md hover:bg-[#1a3a5a] transition-colors flex items-center">
                            <i class="fa-solid fa-save mr-2"></i> Guardar Cambios
                        </button>
                    </div>
                </form>
            </div>
        </div>
        <div th:replace="~{fragments/layout :: footer}"></div>
    </main>
</body>
</html>
