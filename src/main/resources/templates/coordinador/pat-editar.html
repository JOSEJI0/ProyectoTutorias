<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Editar PAT Institucional')}"></th:block>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <div class="flex min-h-screen">
        <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

        <main class="flex-1 flex flex-col min-w-0">
            
            <header class="bg-white border-b border-slate-200 p-4 px-10 sticky top-0 z-30">
                <div class="flex items-center gap-2 text-xs font-bold text-slate-400 uppercase tracking-widest">
                    <a th:href="@{/coordinador/panel}" class="hover:text-blue-600">Panel</a>
                    <i class="fa-solid fa-chevron-right text-[8px]"></i>
                    <a th:href="@{/coordinador/pat}" class="hover:text-blue-600">Planes Institucionales</a>
                    <i class="fa-solid fa-chevron-right text-[8px]"></i>
                    <span class="text-slate-900">Editar Configuración</span>
                </div>
            </header>

            <div class="p-10 flex-1 flex flex-col items-center justify-center">
                
                <div class="max-w-2xl w-full">
                    <a th:href="@{/coordinador/pat}" class="group inline-flex items-center gap-2 text-slate-400 hover:text-[#0B172A] font-black text-[10px] uppercase tracking-[0.2em] mb-8 transition-all">
                        <i class="fa-solid fa-arrow-left-long transition-transform group-hover:-translate-x-1"></i> 
                        Volver al Catálogo
                    </a>

                    <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden">
                        
                        <div class="bg-[#0B172A] p-10 text-white relative overflow-hidden">
                            <div class="relative z-10">
                                <div class="flex items-center gap-4 mb-4">
                                    <div class="w-12 h-12 bg-amber-400 text-[#0B172A] rounded-2xl flex items-center justify-center text-xl shadow-lg">
                                        <i class="fa-solid fa-gears"></i>
                                    </div>
                                    <h1 class="text-2xl font-black tracking-tight">Editar Plan Institucional</h1>
                                </div>
                                <p class="text-slate-400 text-sm">Modifica los parámetros base del temario institucional.</p>
                            </div>
                            <i class="fa-solid fa-file-invoice absolute -right-4 -bottom-4 text-white/5 text-8xl"></i>
                        </div>

                        <form th:action="@{/coordinador/pat/actualizar}" method="POST" class="p-10 space-y-8">
                            <input type="hidden" name="idPat" th:value="${pat.idPat}">
                            
                            <div class="space-y-6">
                                <div>
                                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2 px-1">Periodo Escolar *</label>
                                    <select name="idPeriodo" required 
                                            class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-700 transition-all appearance-none cursor-pointer">
                                        <option th:each="p : ${periodos}" 
                                                th:value="${p.idPeriodo}" 
                                                th:text="${p.nombrePeriodo}"
                                                th:selected="${p.idPeriodo == pat.periodo.idPeriodo}"></option>
                                    </select>
                                </div>

                                <div>
                                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2 px-1">Carrera Asignada *</label>
                                    <select name="idCarrera" required 
                                            class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-700 transition-all appearance-none cursor-pointer">
                                        <option th:each="c : ${carreras}" 
                                                th:value="${c.idCarrera}" 
                                                th:text="${c.nombreCarrera}"
                                                th:selected="${c.idCarrera == pat.carrera.idCarrera}"></option>
                                    </select>
                                </div>

                                <div>
                                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2 px-1">Versión del Temario *</label>
                                    <input type="text" name="version" th:value="${pat.version}" required
                                           class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 outline-none focus:ring-2 focus:ring-blue-500 font-mono font-bold text-blue-600 transition-all"
                                           placeholder="Ej. V1.0">
                                </div>
                            </div>

                            <div class="flex items-center justify-end gap-6 pt-6 border-t border-slate-50">
                                <a th:href="@{/coordinador/pat}" 
                                   class="text-xs font-black text-slate-400 uppercase tracking-widest hover:text-red-500 transition-colors">
                                    Cancelar
                                </a>
                                <button type="submit" 
                                        class="bg-[#0B172A] text-white px-10 py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl shadow-slate-200 hover:bg-slate-800 transition-all flex items-center gap-3">
                                    <i class="fa-solid fa-save text-amber-400"></i> Guardar Cambios
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <div th:replace="~{fragments/layout :: footer}"></div>
            </div>
        </main>
    </div>

</body>
</html>
