<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Editar PAT Institucional')}"></th:block>
</head>
<body>

    <div th:replace="~{fragments/layout :: sidebarCoordinador}"></div>

    <main>
        <section>
            <a th:href="@{/coordinador/pat}">Volver al catálogo</a>
            
            <header>
                <h1>Editar Plan Institucional</h1>
                <p>Modifica la carrera, periodo o versión del temario base.</p>
            </header>

            <form th:action="@{/coordinador/pat/actualizar}" method="POST">
                <!-- Campo oculto para identificar el registro a actualizar -->
                <input type="hidden" name="idPat" th:value="${pat.idPat}">
                
                <fieldset>
                    <legend>Configuración del Plan</legend>

                    <div>
                        <label>Periodo Escolar *</label>
                        <br>
                        <select name="idPeriodo" required>
                            <!-- Itera y pre-selecciona el periodo actual del PAT -->
                            <option th:each="p : ${periodos}" 
                                    th:value="${p.idPeriodo}" 
                                    th:text="${p.nombrePeriodo}"
                                    th:selected="${p.idPeriodo == pat.periodo.idPeriodo}"></option>
                        </select>
                    </div>

                    <br>

                    <div>
                        <label>Carrera Asignada *</label>
                        <br>
                        <select name="idCarrera" required>
                            <!-- Itera y pre-selecciona la carrera actual del PAT -->
                            <option th:each="c : ${carreras}" 
                                    th:value="${c.idCarrera}" 
                                    th:text="${c.nombreCarrera}"
                                    th:selected="${c.idCarrera == pat.carrera.idCarrera}"></option>
                        </select>
                    </div>

                    <br>

                    <div>
                        <label>Versión *</label>
                        <br>
                        <input type="text" name="version" th:value="${pat.version}" required>
                    </div>
                </fieldset>
                
                <br>

                <div>
                    <button type="submit">Guardar Cambios</button>
                </div>
            </form>
        </section>

        <div th:replace="~{fragments/layout :: footer}"></div>
    </main>
</body>
</html>
