<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Sistema de Tutorías</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md animate-fade-in">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-[#0B172A] text-amber-400 rounded-[2rem] shadow-2xl shadow-blue-900/20 mb-6 text-2xl font-black border-4 border-white">
                ITCH
            </div>
            <h1 class="text-3xl font-black text-[#0B172A] tracking-tight">Portal de Tutorías</h1>
            <p class="text-slate-400 text-xs font-bold uppercase tracking-[0.3em] mt-2">Instituto Tecnológico de Chilpancingo</p>
        </div>

        <div class="bg-white p-10 rounded-[3rem] shadow-xl shadow-slate-200/60 border border-white">
            
            <div th:if="${param.error}" class="mb-8 flex items-center gap-4 p-4 rounded-2xl bg-red-50 border border-red-100 animate-pulse">
                <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-red-500 shadow-sm shrink-0">
                    <i class="fa-solid fa-circle-exclamation"></i>
                </div>
                <p class="text-xs font-bold text-red-800 leading-tight">Credenciales incorrectas. Verifique sus datos e intente de nuevo.</p>
            </div>

            <div th:if="${param.logout}" class="mb-8 flex items-center gap-4 p-4 rounded-2xl bg-emerald-50 border border-emerald-100">
                <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-emerald-500 shadow-sm shrink-0">
                    <i class="fa-solid fa-circle-check"></i>
                </div>
                <p class="text-xs font-bold text-emerald-800 leading-tight">Sesión finalizada. Gracias por usar el sistema.</p>
            </div>

            <form th:action="@{/authenticateTheUser}" method="POST" class="space-y-8">
                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Correo Institucional</label>
                    <div class="relative group">
                        <span class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-blue-600 transition-colors">
                            <i class="fa-solid fa-envelope text-sm"></i>
                        </span>
                        <input type="email" name="correo" required autofocus
                               placeholder="usuario@itchilpancingo.edu.mx"
                               class="w-full pl-12 pr-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-600 outline-none transition-all text-sm font-bold text-slate-700 placeholder:text-slate-300 placeholder:font-medium">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Contraseña</label>
                    <div class="relative group">
                        <span class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-blue-600 transition-colors">
                            <i class="fa-solid fa-lock text-sm"></i>
                        </span>
                        <input type="password" name="password" required
                               placeholder="••••••••"
                               class="w-full pl-12 pr-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-600 outline-none transition-all text-sm font-bold text-slate-700 placeholder:text-slate-300">
                    </div>
                </div>

                <div class="flex items-center justify-between px-1">
                    <label class="flex items-center text-[11px] font-bold text-slate-400 cursor-pointer hover:text-slate-600 transition-colors">
                        <input type="checkbox" name="remember-me" class="w-4 h-4 rounded-lg border-slate-300 text-[#0B172A] focus:ring-[#0B172A] mr-2">
                        Recordarme en este equipo
                    </label>
                </div>

                <button type="submit" 
                        class="w-full py-5 bg-[#0B172A] text-white font-black text-xs uppercase tracking-[0.2em] rounded-2xl hover:bg-slate-800 shadow-xl shadow-blue-900/20 hover:-translate-y-1 active:scale-95 transition-all flex items-center justify-center gap-3">
                    Ingresar al Sistema
                    <i class="fa-solid fa-arrow-right-long"></i>
                </button>
            </form>
        </div>

        <p class="text-center mt-10 text-[10px] font-bold text-slate-300 uppercase tracking-widest">
            &copy; 2026 Plataforma de Tutorías ITCH
        </p>

    </div>

</body>
</html>
