<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Sistema | ITCH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
        }
        .login-card { 
            background: rgba(255, 255, 255, 1); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6">

    <div class="login-card w-full max-w-md p-10 md:p-14 rounded-[3rem] border border-slate-100">
        
        <div class="text-center mb-10">
            <div class="inline-flex h-16 w-16 bg-emerald-500 rounded-2xl items-center justify-center shadow-lg shadow-emerald-500/20 mb-6 rotate-3">
                <i class="fa-solid fa-shield-halved text-3xl text-white"></i>
            </div>
            <h2 class="text-3xl font-[800] text-slate-900 tracking-tight mb-2">Bienvenido</h2>
            <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Sistema de Tutorías ITCH</p>
        </div>

        <div th:if="${error}" class="mb-8 bg-red-50 border-l-4 border-red-500 p-4 rounded-r-2xl text-red-800 shadow-sm flex items-center gap-3">
            <i class="fa-solid fa-circle-exclamation text-red-500"></i>
            <span class="text-xs font-bold" th:text="${error}">Credenciales incorrectas</span>
        </div>

        <form th:action="@{/authenticateTheUser}" method="POST" class="space-y-6">
            <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div>
                <label class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest block mb-2 px-1">Correo Electrónico</label>
                <div class="relative">
                    <span class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-300">
                        <i class="fa-solid fa-id-card-clip"></i>
                    </span>
                    <input type="text" name="correo" placeholder="Correo Institucional" required
                           class="w-full bg-slate-50 border-2 border-transparent focus:border-emerald-500/20 rounded-2xl px-12 py-4 text-sm font-semibold text-slate-700 outline-none transition-all placeholder:text-slate-300">
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-2 px-1">
                    <label class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest">Contraseña</label>
                    <a href="#" class="text-[10px] font-black text-emerald-600 hover:text-emerald-700 uppercase tracking-widest transition-colors">¿Olvidaste tu clave?</a>
                </div>
                <div class="relative">
                    <span class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-300">
                        <i class="fa-solid fa-key"></i>
                    </span>
                    <input type="password" name="password" placeholder="••••••••" required
                           class="w-full bg-slate-50 border-2 border-transparent focus:border-emerald-500/20 rounded-2xl px-12 py-4 text-sm font-semibold text-slate-700 outline-none transition-all placeholder:text-slate-300">
                </div>
            </div>

            <div class="flex items-center px-1">
                <input type="checkbox" id="recordar" class="w-5 h-5 rounded-lg border-2 border-slate-200 text-emerald-500 focus:ring-emerald-500/20 transition-all cursor-pointer">
                <label for="recordar" class="ml-3 text-xs font-bold text-slate-500 cursor-pointer">Recordar sesión</label>
            </div>

            <button type="submit" class="w-full bg-slate-900 hover:bg-emerald-600 text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-2xl shadow-slate-900/10 transition-all flex items-center justify-center gap-3 group mt-4">
                Acceder al Sistema <i class="fa-solid fa-arrow-right-long transition-transform group-hover:translate-x-1"></i>
            </button>
        </form>

        <div class="mt-12 text-center">
            <p class="text-[10px] font-black text-slate-300 uppercase tracking-[0.2em] mb-4">Soporte Técnico</p>
            <div class="flex justify-center gap-4">
                <a href="#" class="h-10 w-10 bg-slate-50 rounded-xl flex items-center justify-center text-slate-400 hover:text-emerald-600 hover:bg-emerald-50 transition-all border border-slate-100">
                    <i class="fa-solid fa-envelope-open-text text-sm"></i>
                </a>
                <a href="#" class="h-10 w-10 bg-slate-50 rounded-xl flex items-center justify-center text-slate-400 hover:text-emerald-600 hover:bg-emerald-50 transition-all border border-slate-100">
                    <i class="fa-solid fa-circle-question text-sm"></i>
                </a>
            </div>
        </div>
    </div>

</body>
</html>
