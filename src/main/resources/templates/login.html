<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Tutorías</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="w-full max-w-md">
        <!-- Logo o Siglas del Instituto -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-[#0B2A4A] text-white rounded-2xl shadow-lg mb-4 text-xl font-black">
                ITCH
            </div>
            <h1 class="text-2xl font-bold text-slate-800">Sistema de Tutorías</h1>
            <p class="text-slate-500 mt-2">ITCH</p>
        </div>

        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
            
            <!-- Alerta de Error -->
            <div th:if="${param.error}" class="mb-6 flex items-center gap-3 p-4 text-sm text-red-800 border border-red-100 rounded-xl bg-red-50" role="alert">
                <i class="fa-solid fa-triangle-exclamation text-red-500"></i>
                <div>Credenciales incorrectas. Intente de nuevo.</div>
            </div>

            <!-- Alerta de Logout -->
            <div th:if="${param.logout}" class="mb-6 flex items-center gap-3 p-4 text-sm text-emerald-800 border border-emerald-100 rounded-xl bg-emerald-50" role="alert">
                <i class="fa-solid fa-circle-check text-emerald-500"></i>
                <div>Sesión finalizada con éxito.</div>
            </div>

            <form th:action="@{/authenticateTheUser}" method="POST" class="space-y-6">
                <!-- Token CSRF para seguridad -->
                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Correo Electrónico</label>
                    <input type="email" name="correo" required autofocus
                           placeholder="usuario@itchilpancingo.edu.mx"
                           class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-[#0B2A4A] focus:border-transparent outline-none transition-all text-slate-700">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Contraseña</label>
                    <input type="password" name="password" required
                           placeholder="••••••••"
                           class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-[#0B2A4A] focus:border-transparent outline-none transition-all text-slate-700">
                </div>

                <div class="flex items-center justify-between">
                    <label class="flex items-center text-sm text-slate-600 cursor-pointer">
                        <input type="checkbox" name="remember-me" class="w-4 h-4 rounded border-slate-300 text-[#0B2A4A] focus:ring-[#0B2A4A] mr-2">
                        Recordarme
                    </label>
                </div>

                <button type="submit" 
                        class="w-full py-3.5 bg-[#0B2A4A] text-white font-bold rounded-xl hover:bg-slate-800 shadow-md hover:shadow-lg transition-all flex items-center justify-center gap-2">
                    Iniciar Sesión
                    <i class="fa-solid fa-chevron-right text-xs"></i>
                </button>
            </form>
        </div>

    </div>

</body>
</html>
