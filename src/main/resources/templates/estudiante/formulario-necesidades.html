<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Detección de Necesidades')}"></th:block>
</head>
<body>

    <div th:replace="~{fragments/layout :: sidebarEstudiante}"></div>

    <main>
        <section>
            <a th:href="@{/estudiante/panel}">Volver al Panel</a>

            <header>
                <h1>Formato de Detección de Necesidades</h1>
                <p>
                    Este formato es confidencial y será enviado directamente a tu tutor: 
                    <strong th:text="${estudiante.grupo.tutor.usuario.nombre}"></strong>.
                </p>
            </header>

            <!-- Formulario de envío (RF5) -->
            <form th:action="@{/estudiante/deteccion-necesidades/enviar}" method="POST">
                
                <div>
                    <label>Área de Atención Requerida</label>
                    <br>
                    <select name="area" required>
                        <option value="" disabled selected>Selecciona el área principal...</option>
                        <option value="Academica">Apoyo Académico (Materias, técnicas de estudio)</option>
                        <option value="Vocacional">Orientación Vocacional o Profesional</option>
                        <option value="Personal">Apoyo Personal o Psicológico</option>
                        <option value="Administrativa">Problemas con trámites administrativos</option>
                    </select>
                </div>

                <br>

                <div>
                    <label>Descripción Breve de tu Situación</label>
                    <br>
                    <textarea name="descripcion" rows="6" required placeholder="Describe brevemente cómo puede apoyarte tu tutor..."></textarea>
                </div>

                <br>

                <div>
                    <button type="submit">
                        Enviar Solicitud al Tutor
                    </button>
                </div>
            </form>
        </section>
    </main>

</body>
</html>
