<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <title>Historial de Asistencia</title>
    <style>
        @page { size: letter portrait; margin: 2cm; @top-right { content: "Página " counter(page); font-family: sans-serif; font-size: 9pt; color: #888; } }
        body { font-family: sans-serif; color: #333; }
        .header { text-align: center; border-bottom: 2px solid #0B2A4A; padding-bottom: 10px; margin-bottom: 20px; }
        .header h1 { color: #0B2A4A; margin: 0; font-size: 18pt; }
        .info-box { border: 1px solid #ddd; padding: 15px; background: #f9f9f9; margin-bottom: 20px; font-size: 10pt; }
        .label { font-weight: bold; color: #0B2A4A; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px;}
        th { background-color: #0B2A4A; color: white; font-size: 10pt; padding: 8px; border: 1px solid #0B2A4A; }
        td { font-size: 9pt; padding: 6px 8px; border: 1px solid #ddd; }
        .presente { color: #059669; font-weight: bold; }
        .falta { color: #dc2626; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Kardex de Asistencias a Tutoría</h1>
    </div>
    
    <div class="info-box">
        <p><span class="label">Estudiante:</span> <span th:text="${estudiante.usuario.nombre + ' ' + estudiante.usuario.apellidos}"></span></p>
        <p><span class="label">No. Control:</span> <span th:text="${estudiante.numeroControl}"></span> &#160;&#160;|&#160;&#160; <span class="label">Carrera:</span> <span th:text="${estudiante.carrera.nombreCarrera}"></span></p>
        <p><span class="label">Grupo:</span> <span th:text="${estudiante.grupo != null ? estudiante.grupo.nombreGrupo : 'N/A'}"></span></p>
        <hr style="border: 0; border-top: 1px solid #ddd; margin: 10px 0;"/>
        <p><b>Resumen:</b> <span th:text="${totalAsistencias}">0</span> Asistencias &#160;|&#160; <span th:text="${totalFaltas}">0</span> Faltas</p>
    </div>

    <table>
        <thead>
            <tr>
                <th style="width: 15%;">Fecha</th>
                <th style="width: 15%;">Semana</th>
                <th style="width: 55%;">Actividad de la Sesión</th>
                <th style="width: 15%;">Estatus</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="asistencia : ${historial}">
                <td style="text-align: center;" th:text="${#temporals.format(asistencia.sesion.fechaImparticion, 'dd/MM/yyyy')}"></td>
                <td style="text-align: center;" th:text="'Semana ' + ${asistencia.sesion.semanaNumero}"></td>
                <td th:text="${asistencia.sesion.actividad != null ? asistencia.sesion.actividad.titulo : 'Sesión de Seguimiento'}"></td>
                <td style="text-align: center;">
                    <span th:if="${asistencia.presente}" class="presente">Asistencia</span>
                    <span th:unless="${asistencia.presente}" class="falta">Falta</span>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
