<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <title>Lista de Asistencia</title>
    <style>
        @page { size: letter portrait; margin: 2cm; @top-right { content: "Página " counter(page); font-family: sans-serif; font-size: 9pt; color: #888; } }
        body { font-family: sans-serif; color: #333; }
        .header { text-align: center; border-bottom: 2px solid #2A4F73; padding-bottom: 10px; margin-bottom: 15px; }
        .header h1 { color: #2A4F73; margin: 0; font-size: 16pt; }
        .info-table { width: 100%; margin-bottom: 15px; font-size: 10pt; }
        .info-table td { padding: 4px; }
        .label { font-weight: bold; color: #2A4F73; width: 15%; }
        table.datos { width: 100%; border-collapse: collapse; }
        table.datos th { background-color: #2A4F73; color: white; font-size: 9pt; padding: 8px; text-align: center; border: 1px solid #2A4F73; }
        table.datos td { font-size: 9pt; padding: 6px; border: 1px solid #666; height: 20px;}
    </style>
</head>
<body>
    <div class="header">
        <h1>Formato Control de Asistencia - Tutorías</h1>
    </div>
    <table class="info-table">
        <tr>
            <td class="label">Tutor:</td><td th:text="${grupo.tutor.usuario.nombre + ' ' + grupo.tutor.usuario.apellidos}"></td>
            <td class="label">Grupo:</td><td th:text="${grupo.nombreGrupo}"></td>
        </tr>
        <tr>
            <td class="label">Carrera:</td><td th:text="${grupo.carrera.nombreCarrera}"></td>
            <td class="label">Periodo:</td><td th:text="${grupo.periodo.nombrePeriodo}"></td>
        </tr>
    </table>
    <table class="datos">
        <thead>
            <tr>
                <th style="width: 5%;">No.</th>
                <th style="width: 20%;">No. Control</th>
                <th style="width: 45%; text-align: left;">Nombre del Estudiante</th>
                <th style="width: 6%;">1</th><th style="width: 6%;">2</th><th style="width: 6%;">3</th><th style="width: 6%;">4</th><th style="width: 6%;">5</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="est, iter : ${estudiantes}">
                <td style="text-align: center;" th:text="${iter.count}"></td>
                <td style="text-align: center;" th:text="${est.numeroControl}"></td>
                <td th:text="${est.usuario.apellidos + ' ' + est.usuario.nombre}"></td>
                <td></td><td></td><td></td><td></td><td></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
