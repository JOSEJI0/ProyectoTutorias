<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <!-- Mantenemos el fragmento de encabezado institucional -->
    <th:block th:replace="~{fragments/layout :: encabezado('Detalle de Sesión')}"></th:block>
</head>
<body>

    <!-- Sidebar de navegación docente -->
    <div th:replace="~{fragments/layout :: sidebarTutor}"></div>

    <main>
        <section>
            <header>
                <h1>Detalle de Sesión <span th:text="'#' + ${sesion.idSesion}"></span></h1>
                <p>
                    Grupo: <strong th:text="${sesion.grupo.nombreGrupo}"></strong> | 
                    Semana: <strong th:text="${sesion.semanaNumero}"></strong>
                </p>
                <a th:href="@{/tutor/panel}">Volver al Panel</a>
            </header>

            <br>

            <!-- Ficha Técnica de la Clase (RF3) -->
            <section>
                <p><strong>Actividad del PAT Realizada:</strong> <span th:text="${sesion.actividad.titulo}"></span></p>
                <p><strong>Fecha de Captura:</strong> <span th:text="${sesion.fechaImparticion}"></span></p>
                <p><strong>Estatus del Registro:</strong> <span th:text="${sesion.estatusRegistro}"></span></p>
            </section>

            <br><hr><br>

            <!-- Tabla de Asistencia Registrada (RF3) -->
            <section>
                <h3>Lista de Alumnos</h3>
                <table>
                    <thead>
                        <tr>
                            <th>No. Control</th>
                            <th>Nombre del Estudiante</th>
                            <th>Estado de Asistencia</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Iteración sobre los registros de asistencia de la sesión específica -->
                        <tr th:each="registro : ${listaAsistencia}">
                            <td th:text="${registro.estudiante.numeroControl}"></td>
                            <td th:text="${registro.estudiante.usuario.nombre} + ' ' + ${registro.estudiante.usuario.apellidos}"></td>
                            <td>
                                <!-- Muestra si el alumno asistió o faltó -->
                                <span th:if="${registro.presente}">Presente</span>
                                <span th:unless="${registro.presente}">Ausente</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </section>

        </section>
        
        <!-- Pie de página institucional -->
        <div th:replace="~{fragments/layout :: footer}"></div>
    </main>
</body>
</html>
