<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Mi Perfil')}"></th:block>
</head>
<body class="bg-slate-50 min-h-screen flex font-sans text-slate-800">

    <div th:replace="~{fragments/layout :: sidebarTutor}"></div>

    <main class="flex-1 p-10 overflow-y-auto flex flex-col">
        <div class="max-w-4xl mx-auto w-full flex-1">
            <header class="mb-8 mt-2">
                <h1 class="text-3xl font-bold text-[#0B2A4A]"><i class="fa-solid fa-user-gear mr-2"></i> Mi Perfil</h1>
                <p class="text-slate-500">Gestiona tu información personal y foto de identidad.</p>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 text-center">
                    <div class="relative inline-block mb-4">
                        <img th:src="@{'/uploads/' + ${usuario.fotoPerfil}}" 
                             class="w-32 h-32 rounded-full object-cover border-4 border-white shadow-lg mx-auto" alt="Foto de perfil">
                    </div>
                    <h3 class="font-bold text-xl text-[#0B2A4A]" th:text="${usuario.nombre + ' ' + usuario.apellidos}"></h3>
                    <p class="text-sm text-slate-400" th:text="${usuario.correoInstitucional}"></p>
                </div>

                <div class="lg:col-span-2 bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                    <form th:action="@{/tutor/perfil/actualizar-foto}" method="POST" enctype="multipart/form-data" class="space-y-6">
                        <div>
                            <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Cambiar Foto de Perfil</label>
                            <div class="mt-2 flex items-center gap-4">
                                <input type="file" name="foto" accept="image/*" required 
                                       class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition-all cursor-pointer">
                            </div>
                            <p class="text-[10px] text-slate-400 mt-2 italic">Formatos permitidos: JPG, PNG. Tamaño máximo: 2MB.</p>
                        </div>

                        <div class="pt-4">
                            <button type="submit" class="bg-[#0B2A4A] text-white px-8 py-3 rounded-xl font-bold hover:bg-[#1a3a5a] transition-all shadow-md">
                                <i class="fa-solid fa-cloud-arrow-up mr-2"></i> Subir Nueva Foto
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        
        <div th:replace="~{fragments/layout :: footer}"></div>
    </main>
</body>
</html>
