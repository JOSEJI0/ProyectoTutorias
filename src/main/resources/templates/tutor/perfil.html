<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Mi Perfil')}"></th:block>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .profile-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen flex text-slate-900">

    <div th:replace="~{fragments/layout :: sidebarTutor}"></div>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-20 bg-white/50 backdrop-blur-xl flex items-center justify-between px-12 border-b border-slate-200/60 sticky top-0 z-50">
            <div class="flex items-center gap-2 text-slate-400 text-sm font-bold">
                <span class="hover:text-blue-600 transition-colors uppercase tracking-tighter text-xs">Ajustes</span>
                <i class="fa-solid fa-chevron-right text-[10px]"></i>
                <span class="text-slate-900 font-bold uppercase tracking-tighter text-xs">Mi Perfil</span>
            </div>
            <div class="bg-blue-500/10 text-blue-600 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest border border-blue-500/20">
                Identidad Digital
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-12 custom-scrollbar">
            <div class="max-w-5xl mx-auto w-full">
                
                <div class="mb-12">
                    <h1 class="text-4xl font-[800] text-slate-900 tracking-tight">Configuración de Perfil</h1>
                    <p class="text-slate-500 mt-2 font-medium italic">Personaliza tu información de identidad y gestiona tu fotografía institucional.</p>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                    <div class="lg:col-span-1">
                        <div class="glass-card p-10 rounded-[3rem] shadow-xl border border-slate-100 text-center relative overflow-hidden group">
                            <div class="relative inline-block mb-6">
                                <div class="absolute inset-0 bg-blue-500 rounded-full blur-2xl opacity-10 group-hover:opacity-20 transition-opacity"></div>
                                <img th:src="@{'/uploads/' + ${usuario.fotoPerfil}}" 
                                     class="relative w-40 h-40 rounded-[2.5rem] object-cover border-4 border-white shadow-2xl mx-auto transition-transform group-hover:scale-105" 
                                     alt="Foto de perfil">
                            </div>
                            
                            <h3 class="text-xl font-extrabold text-slate-900 mb-1" th:text="${usuario.nombre + ' ' + usuario.apellidos}"></h3>
                            <p class="text-xs font-bold text-blue-500 uppercase tracking-widest mb-6" th:text="${usuario.correoInstitucional}"></p>
                            
                            <div class="pt-6 border-t border-slate-50 flex items-center justify-center gap-3">
                                <span class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>
                                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Cuenta Activa</span>
                            </div>
                        </div>
                    </div>

                    <div class="lg:col-span-2">
                        <div class="glass-card p-10 rounded-[3rem] shadow-sm border border-slate-100 h-full flex flex-col justify-center">
                            <div class="flex items-center gap-4 mb-8">
                                <div class="h-12 w-12 bg-slate-900 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-slate-900/20">
                                    <i class="fa-solid fa-camera-rotate text-xl"></i>
                                </div>
                                <div>
                                    <h3 class="text-xl font-extrabold text-slate-800">Actualizar Fotografía</h3>
                                    <p class="text-xs text-slate-400 font-semibold">Selecciona una imagen reciente para tu perfil</p>
                                </div>
                            </div>

                            <form th:action="@{/tutor/perfil/actualizar-foto}" method="POST" enctype="multipart/form-data" class="space-y-8">
                                <div class="bg-slate-50/50 p-8 rounded-3xl border-2 border-dashed border-slate-200 hover:border-blue-400 transition-colors">
                                    <label class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest block mb-4">Seleccionar Archivo</label>
                                    <input type="file" name="foto" accept="image/*" required 
                                           class="block w-full text-xs text-slate-500 file:mr-5 file:py-3 file:px-6 file:rounded-2xl file:border-0 file:text-[10px] file:font-black file:bg-slate-900 file:text-white hover:file:bg-blue-600 transition-all cursor-pointer">
                                    
                                    <div class="mt-6 flex items-center gap-3 text-slate-400">
                                        <i class="fa-solid fa-circle-info text-[10px]"></i>
                                        <p class="text-[9px] font-bold uppercase tracking-widest">JPG o PNG • Máximo 2.0 MB</p>
                                    </div>
                                </div>

                                <div class="flex justify-end pt-4">
                                    <button type="submit" class="w-full md:w-auto bg-slate-900 hover:bg-blue-600 text-white px-10 py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-2xl shadow-slate-900/10 transition-all flex items-center justify-center gap-3 group">
                                        <span>Subir Nueva Foto</span>
                                        <i class="fa-solid fa-cloud-arrow-up transition-transform group-hover:-translate-y-1"></i>
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div th:replace="~{fragments/layout :: footer}"></div>
    </main>

</body>
</html>
