<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Mi Perfil')}"></th:block>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <div class="flex min-h-screen">
        <div th:replace="~{fragments/layout :: sidebarTutor}"></div>

        <main class="flex-1 flex flex-col min-w-0 h-screen overflow-y-auto custom-scrollbar">
            
            <header class="bg-white border-b border-slate-200 p-8 px-10 sticky top-0 z-30">
                <div class="max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                    <div>
                        <h1 class="text-3xl font-black text-[#0B172A] tracking-tight">Mi Perfil Profesional</h1>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Configuración de Cuenta y Seguridad</p>
                    </div>
                </div>
            </header>

            <div class="p-10 max-w-5xl mx-auto w-full space-y-8">

                <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden">
                    <div class="flex flex-col md:flex-row">
                        <div class="bg-[#0B172A] p-10 flex flex-col items-center justify-center md:w-1/3">
                            <div class="relative group">
                                <div class="w-40 h-40 rounded-[2.5rem] overflow-hidden border-4 border-white/10 shadow-2xl transition-transform group-hover:scale-105">
                                    <img th:src="@{'/uploads/' + ${usuario.fotoPerfil}}" 
                                         class="w-full h-full object-cover" alt="Foto de perfil">
                                </div>
                                <div class="absolute -bottom-2 -right-2 bg-amber-400 text-[#0B172A] w-10 h-10 rounded-xl flex items-center justify-center shadow-lg">
                                    <i class="fa-solid fa-camera"></i>
                                </div>
                            </div>
                            <div class="mt-6 text-center text-white">
                                <h3 class="font-black text-lg" th:text="${usuario.nombre + ' ' + usuario.apellidos}">Nombre</h3>
                                <p class="text-xs text-slate-400 font-medium" th:text="${usuario.correoInstitucional}">correo@itch.edu.mx</p>
                            </div>
                        </div>

                        <div class="p-10 flex-1 flex flex-col justify-center bg-slate-50/30">
                            <h3 class="font-black text-[#0B172A] uppercase tracking-widest text-xs mb-4">Actualizar Fotografía</h3>
                            <form th:action="@{/tutor/perfil/actualizar-foto}" method="POST" enctype="multipart/form-data" class="space-y-6">
                                <div class="relative border-2 border-dashed border-slate-200 rounded-3xl p-8 text-center hover:border-blue-400 transition-colors bg-white">
                                    <input type="file" name="foto" accept="image/*" required 
                                           class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                                    <div class="text-slate-400">
                                        <i class="fa-solid fa-cloud-arrow-up text-3xl mb-2"></i>
                                        <p class="text-xs font-bold uppercase tracking-tighter">Seleccionar Archivo</p>
                                        <p class="text-[10px] italic">JPG o PNG (Máx. 2MB)</p>
                                    </div>
                                </div>
                                <button type="submit" class="bg-[#0B172A] text-white w-full py-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-slate-800 transition-all shadow-xl shadow-slate-200">
                                    Subir Nueva Foto
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 p-10">
                    <div class="flex items-center gap-3 mb-8">
                        <div class="w-10 h-10 bg-amber-50 text-amber-600 rounded-xl flex items-center justify-center text-xl">
                            <i class="fa-solid fa-shield-halved"></i>
                        </div>
                        <h3 class="font-black text-[#0B172A] uppercase tracking-widest text-xs">Seguridad de la Cuenta</h3>
                    </div>

                    <div th:if="${param.error != null}" class="mb-8 p-4 bg-red-50 border border-red-100 text-red-700 rounded-2xl text-xs font-bold animate-shake">
                        <i class="fa-solid fa-circle-exclamation mr-2"></i>
                        <span th:if="${param.error[0] == 'no_coinciden'}">Las contraseñas nuevas no coinciden.</span>
                        <span th:if="${param.error[0] == 'password_incorrecta'}">La contraseña actual es incorrecta.</span>
                    </div>
                    <div th:if="${param.exito != null}" class="mb-8 p-4 bg-emerald-50 border border-emerald-100 text-emerald-700 rounded-2xl text-xs font-bold">
                        <i class="fa-solid fa-circle-check mr-2"></i> ¡Contraseña actualizada exitosamente!
                    </div>

                    <form th:action="@{/usuario/cambiar-password}" method="POST" class="grid grid-cols-1 md:grid-cols-3 gap-6 items-end">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Contraseña Actual</label>
                            <input type="password" name="passwordActual" required 
                                   class="w-full bg-slate-50 border border-slate-200 rounded-xl px-5 py-4 outline-none focus:ring-2 focus:ring-blue-500 font-bold transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Nueva Contraseña</label>
                            <input type="password" name="nuevaPassword" required minlength="4" 
                                   class="w-full bg-slate-50 border border-slate-200 rounded-xl px-5 py-4 outline-none focus:ring-2 focus:ring-blue-500 font-bold transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Confirmar Nueva</label>
                            <input type="password" name="confirmarPassword" required minlength="4" 
                                   class="w-full bg-slate-50 border border-slate-200 rounded-xl px-5 py-4 outline-none focus:ring-2 focus:ring-blue-500 font-bold transition-all">
                        </div>
                        
                        <div class="md:col-span-3 flex justify-end pt-4">
                            <button type="submit" class="bg-amber-400 text-[#0B172A] px-10 py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl shadow-amber-100 hover:bg-amber-500 hover:-translate-y-1 transition-all flex items-center gap-2">
                                <i class="fa-solid fa-key"></i> Actualizar Contraseña
                            </button>
                        </div>
                    </form>
                </div>

                <div th:replace="~{fragments/layout :: footer}"></div>
            </div>
        </main>
    </div>

</body>
</html>
