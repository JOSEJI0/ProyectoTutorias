<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <!-- Mantiene el fragmento de encabezado institucional -->
    <th:block th:replace="~{fragments/layout :: encabezado('Mi Perfil')}"></th:block>
</head>
<body>

    <!-- Sidebar de navegación docente -->
    <div th:replace="~{fragments/layout :: sidebarTutor}"></div>

    <main>
        <section>
            <header>
                <h1>Mi Perfil</h1>
                <p>Gestiona tu información personal y foto de identidad.</p>
            </header>

            <!-- Resumen de Identidad -->
            <section>
                <div>
                    <!-- Visualización de foto almacenada en el servidor -->
                    <img th:src="@{'/uploads/' + ${usuario.fotoPerfil}}" width="150" alt="Foto de perfil">
                </div>
                <div>
                    <h3 th:text="${usuario.nombre + ' ' + usuario.apellidos}"></h3>
                    <p th:text="${usuario.correoInstitucional}"></p>
                </div>
            </section>

            <br>

            <!-- Formulario de Actualización de Foto (RF1)[cite: 1] -->
            <section>
                <form th:action="@{/tutor/perfil/actualizar-foto}" method="POST" enctype="multipart/form-data">
                    <label>Cambiar Foto de Perfil</label>
                    <br>
                    <input type="file" name="foto" accept="image/*" required>
                    <p><small>Formatos permitidos: JPG, PNG. Tamaño máximo: 2MB.</small></p>

                    <button type="submit">Subir Nueva Foto</button>
                </form>
            </section>

            <br><hr><br>

            <!-- Gestión de Seguridad y Contraseña[cite: 1] -->
            <section>
                <h4>Seguridad de la Cuenta</h4>

                <!-- Alertas de estado de operación[cite: 1] -->
                <div th:if="${param.error != null and param.error[0] == 'no_coinciden'}">Las contraseñas nuevas no coinciden.</div>
                <div th:if="${param.error != null and param.error[0] == 'password_incorrecta'}">La contraseña actual es incorrecta.</div>
                <div th:if="${param.exito != null and param.exito[0] == 'password_cambiada'}">¡Contraseña actualizada exitosamente!</div>

                <form th:action="@{/usuario/cambiar-password}" method="POST">
                    <div>
                        <label>Contraseña Actual</label>
                        <input type="password" name="passwordActual" required>
                    </div>
                    
                    <br>

                    <div>
                        <label>Nueva Contraseña</label>
                        <input type="password" name="nuevaPassword" required minlength="4">
                    </div>
                    
                    <br>

                    <div>
                        <label>Confirmar Nueva Contraseña</label>
                        <input type="password" name="confirmarPassword" required minlength="4">
                    </div>

                    <br>

                    <button type="submit">Actualizar Contraseña</button>
                </form>
            </section>
        </section>
        
        <!-- Pie de página institucional[cite: 1] -->
        <div th:replace="~{fragments/layout :: footer}"></div>
    </main>
</body>
</html>
