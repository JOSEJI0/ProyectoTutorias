<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Editar Actividad')}"></th:block>
</head>
<body class="bg-slate-50 min-h-screen flex font-sans text-slate-800">

    <div th:replace="~{fragments/layout :: sidebarTutor}"></div>

    <main class="flex-1 p-10 overflow-y-auto flex flex-col items-center justify-center">
        
        <div class="max-w-2xl w-full">
            <div class="mb-6 flex items-center">
                <a th:href="@{/tutor/pat/grupo/{id}(id=${idGrupo})}" class="text-slate-500 hover:text-[#0B2A4A] transition-colors bg-white px-4 py-2 rounded-lg border border-slate-200 shadow-sm text-sm font-bold">
                    <i class="fa-solid fa-arrow-left mr-2"></i> Volver al Plan del Grupo
                </a>
            </div>

            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-blue-50 rounded-bl-full -mr-10 -mt-10"></div>
                
                <h2 class="text-2xl font-bold text-[#0B2A4A] mb-1 relative z-10 flex items-center gap-3">
                    <i class="fa-solid fa-pen-to-square text-blue-500"></i> Detalle y Edición
                </h2>
                <p class="text-slate-500 mb-8 text-sm">Modifica los detalles de esta actividad para adaptarla a las necesidades específicas de tu grupo tutorado.</p>

                <form th:action="@{/tutor/pat/actividad/guardar}" method="POST" class="space-y-6 relative z-10">
                    
                    <input type="hidden" name="idActividadGrupo" th:value="${actividad.idActividadGrupo}">
                    <input type="hidden" name="idGrupo" th:value="${idGrupo}">

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Semana Programada</label>
                            <input type="number" name="semanaProgramada" th:value="${actividad.semanaProgramada}" required min="1" max="16" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-700">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Estatus Actual</label>
                            <select name="estatus" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-700 cursor-pointer">
                                <option value="Pendiente" th:selected="${actividad.estatus == 'Pendiente'}">Pendiente</option>
                                <option value="En Proceso" th:selected="${actividad.estatus == 'En Proceso'}">En Proceso</option>
                                <option value="Completado" th:selected="${actividad.estatus == 'Completado'}">Completado</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Título de la Actividad</label>
                        <input type="text" name="titulo" th:value="${actividad.titulo}" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 font-medium text-slate-700">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Descripción Completa</label>
                        <textarea name="descripcion" rows="5" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 font-medium text-slate-700 resize-none" th:text="${actividad.descripcion}"></textarea>
                    </div>

                    <div class="pt-4 border-t border-slate-100 flex justify-end">
                        <button type="submit" class="bg-[#0B2A4A] text-white px-8 py-3 rounded-xl font-bold shadow-lg hover:bg-[#1a3a5a] transition-all transform hover:-translate-y-1 flex items-center gap-2">
                            Guardar Cambios <i class="fa-solid fa-floppy-disk"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

</body>
</html>
