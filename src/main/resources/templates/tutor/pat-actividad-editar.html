<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <!-- Mantenemos el fragmento de encabezado institucional[cite: 1] -->
    <th:block th:replace="~{fragments/layout :: encabezado('Editar Actividad')}"></th:block>
</head>
<body>

    <!-- Sidebar de navegación docente[cite: 1] -->
    <div th:replace="~{fragments/layout :: sidebarTutor}"></div>

    <main>
        <section>
            <!-- Navegación de retorno al plan específico del grupo -->
            <a th:href="@{/tutor/pat/grupo/{id}(id=${idGrupo})}">
                Volver al Plan del Grupo
            </a>

            <header>
                <h1>Detalle y Edición de Actividad</h1>
                <p>Modifica los detalles de esta actividad para adaptarla a las necesidades específicas de tu grupo tutorado.</p>
            </header>

            <!-- Formulario de actualización (RF4) -->
            <form th:action="@{/tutor/pat/actividad/guardar}" method="POST">
                
                <!-- Identificadores necesarios para la persistencia en BD -->
                <input type="hidden" name="idActividadGrupo" th:value="${actividad.idActividadGrupo}">
                <input type="hidden" name="idGrupo" th:value="${idGrupo}">

                <fieldset>
                    <legend>Configuración de la Actividad</legend>
                    
                    <div>
                        <label>Semana Programada</label>
                        <input type="number" name="semanaProgramada" th:value="${actividad.semanaProgramada}" required min="1" max="16">
                    </div>

                    <br>

                    <div>
                        <label>Estatus Actual</label>
                        <select name="estatus">
                            <option value="Pendiente" th:selected="${actividad.estatus == 'Pendiente'}">Pendiente</option>
                            <option value="En Proceso" th:selected="${actividad.estatus == 'En Proceso'}">En Proceso</option>
                            <option value="Completado" th:selected="${actividad.estatus == 'Completado'}">Completado</option>
                        </select>
                    </div>

                    <br>

                    <div>
                        <label>Título de la Actividad</label>
                        <input type="text" name="titulo" th:value="${actividad.titulo}" required>
                    </div>

                    <br>

                    <div>
                        <label>Descripción Completa</label>
                        <textarea name="descripcion" rows="5" required th:text="${actividad.descripcion}"></textarea>
                    </div>
                </fieldset>

                <br>

                <div>
                    <button type="submit">
                        Guardar Cambios
                    </button>
                </div>
            </form>
        </section>
    </main>

    <!-- Pie de página institucional[cite: 1] -->
    <div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
