<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Editar Actividad')}"></th:block>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <div class="flex min-h-screen">
        <div th:replace="~{fragments/layout :: sidebarTutor}"></div>

        <main class="flex-1 flex flex-col min-w-0 h-screen overflow-y-auto custom-scrollbar">
            
            <header class="bg-white border-b border-slate-200 p-4 px-10 sticky top-0 z-30">
                <div class="max-w-4xl mx-auto flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <a th:href="@{/tutor/pat/grupo/{id}(id=${idGrupo})}" 
                           class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 hover:bg-[#0B172A] hover:text-white transition-all shadow-sm">
                            <i class="fa-solid fa-arrow-left"></i>
                        </a>
                        <div>
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Plan del Grupo</p>
                            <h2 class="text-lg font-black text-[#0B172A]">Editor de Actividad</h2>
                        </div>
                    </div>
                </div>
            </header>

            <div class="p-10 max-w-4xl mx-auto w-full">
                
                <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden">
                    
                    <div class="bg-[#0B172A] p-10 text-white relative overflow-hidden">
                        <div class="relative z-10">
                            <h1 class="text-3xl font-black tracking-tight mb-2">Personalizar Actividad</h1>
                            <p class="text-slate-400 text-sm max-w-md leading-relaxed">
                                Adapta los tiempos, objetivos y descripciones a las necesidades particulares de tu grupo tutorado.
                            </p>
                        </div>
                        <i class="fa-solid fa-pen-to-square absolute -right-4 -bottom-4 text-white/5 text-9xl"></i>
                    </div>

                    <form th:action="@{/tutor/pat/actividad/guardar}" method="POST" class="p-10 space-y-8">
                        
                        <input type="hidden" name="idActividadGrupo" th:value="${actividad.idActividadGrupo}">
                        <input type="hidden" name="idGrupo" th:value="${idGrupo}">

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Semana del Periodo</label>
                                <div class="relative">
                                    <input type="number" name="semanaProgramada" th:value="${actividad.semanaProgramada}" 
                                           required min="1" max="16"
                                           class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-700 transition-all">
                                    <i class="fa-solid fa-calendar-week absolute right-5 top-1/2 -translate-y-1/2 text-slate-300"></i>
                                </div>
                            </div>

                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Estado de Progreso</label>
                                <div class="relative">
                                    <select name="estatus" 
                                            class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-700 appearance-none cursor-pointer transition-all">
                                        <option value="Pendiente" th:selected="${actividad.estatus == 'Pendiente'}">⏳ Pendiente</option>
                                        <option value="En Proceso" th:selected="${actividad.estatus == 'En Proceso'}">⚡ En Proceso</option>
                                        <option value="Completado" th:selected="${actividad.estatus == 'Completado'}">✅ Completado</option>
                                    </select>
                                    <div class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                                        <i class="fa-solid fa-chevron-down text-xs"></i>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Título de la Sesión</label>
                            <input type="text" name="titulo" th:value="${actividad.titulo}" required
                                   class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-700 transition-all"
                                   placeholder="Ej. Introducción a la vida universitaria">
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Instrucciones y Contenido</label>
                            <textarea name="descripcion" rows="6" required th:text="${actividad.descripcion}"
                                      class="w-full bg-slate-50 border border-slate-200 rounded-[2rem] px-6 py-5 outline-none focus:ring-2 focus:ring-blue-500 font-medium text-slate-600 leading-relaxed transition-all"
                                      placeholder="Describe los puntos clave a tratar en la tutoría..."></textarea>
                        </div>

                        <div class="pt-6 flex justify-end">
                            <button type="submit" 
                                    class="bg-amber-400 text-[#0B172A] px-12 py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl shadow-amber-100 hover:bg-amber-500 hover:-translate-y-1 transition-all flex items-center gap-3">
                                <i class="fa-solid fa-floppy-disk"></i> Guardar Cambios
                            </button>
                        </div>
                    </form>
                </div>

                <div th:replace="~{fragments/layout :: footer}"></div>
            </div>
        </main>
    </div>

</body>
</html>
