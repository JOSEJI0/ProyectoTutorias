<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <!-- Mantiene el fragmento de encabezado institucional[cite: 1] -->
    <th:block th:replace="~{fragments/layout :: encabezado('Buzón de Necesidades')}"></th:block>
</head>
<body>

    <!-- Sidebar de navegación docente[cite: 1] -->
    <div th:replace="~{fragments/layout :: sidebarTutor}"></div>

    <main>
        <section>
            <header>
                <h2>Buzón de Detección de Necesidades</h2>
                <p>Solicitudes de apoyo enviadas por tus estudiantes tutorados.</p>
            </header>

            <section>
                <!-- Tarjeta por cada necesidad detectada -->
                <div th:each="n : ${necesidades}">
                    <hr>
                    <!-- Datos del Alumno y Grupo -->
                    <header>
                        <p><strong>Grupo:</strong> <span th:text="${n.estudiante.grupo.nombreGrupo}"></span></p>
                        <h4 th:text="${n.estudiante.usuario.nombre + ' ' + n.estudiante.usuario.apellidos}">Alumno</h4>
                        <p><strong>No. Control:</strong> <span th:text="${n.estudiante.numeroControl}"></span></p>
                    </header>

                    <!-- Detalle de la Petición (RF5) -->
                    <div>
                        <p><strong>Área:</strong> <span th:text="${n.area}"></span></p>
                        <p><strong>Fecha de Solicitud:</strong> <span th:text="${#temporals.format(n.fechaSolicitud, 'dd/MM/yyyy')}"></span></p>
                        <p><strong>Descripción:</strong></p>
                        <p th:text="${n.descripcion}"></p>
                    </div>

                    <!-- Acciones de Gestión de Estatus -->
                    <div>
                        <p><strong>Estatus Actual:</strong> <span th:text="${n.estatus}"></span></p>
                        
                        <!-- Si ya fue revisada -->
                        <span th:if="${n.estatus == 'Atendida'}">✓ Solicitud Atendida</span>
                        
                        <!-- Si está pendiente, permite cambiar el estatus -->
                        <form th:if="${n.estatus == 'Pendiente'}" th:action="@{/tutor/necesidades/{id}/atender(id=${n.idNecesidad})}" method="POST">
                            <button type="submit">Marcar como Atendida</button>
                        </form>
                    </div>
                    <hr>
                </div>

                <!-- Estado del buzón cuando no hay registros -->
                <div th:if="${#lists.isEmpty(necesidades)}">
                    <h3>Buzón vacío</h3>
                    <p>Ninguno de tus alumnos ha emitido un formato de detección de necesidades aún.</p>
                </div>
            </section>
        </section>

        <!-- Pie de página institucional[cite: 1] -->
        <div th:replace="~{fragments/layout :: footer}"></div>
    </main>
</body>
</html>
