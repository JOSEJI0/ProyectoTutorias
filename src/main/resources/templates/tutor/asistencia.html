<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <!-- Mantenemos el encabezado institucional[cite: 1] -->
    <th:block th:replace="~{fragments/layout :: encabezado('Pase de Lista')}"></th:block>
</head>
<body>

    <!-- Sidebar de navegación docente[cite: 1] -->
    <div th:replace="~{fragments/layout :: sidebarTutor}"></div>

    <main>
        <section>
            <header>
                <a th:href="@{/tutor/panel}">Volver al panel</a>
                <div>
                    <!-- Identificación del grupo asignado -->
                    <h2 th:text="${grupo.nombreGrupo}"></h2>
                    <p th:text="${grupo.carrera.nombreCarrera}"></p>
                </div>
            </header>

            <!-- Formulario de Registro de Sesión y Asistencia (RF3) -->
            <form th:action="@{/tutor/guardar-asistencia}" method="POST" enctype="multipart/form-data">
                <!-- ID del grupo para vinculación en el backend -->
                <input type="hidden" name="idGrupo" th:value="${grupo.idGrupo}">

                <fieldset>
                    <legend>Configuración de la Sesión</legend>
                    
                    <label>Semana de Trabajo</label>
                    <select name="semana">
                        <option value="1">Semana 1</option>
                        <option value="2">Semana 2</option>
                        <option value="3">Semana 3</option>
                        <option value="4">Semana 4</option>
                        <option value="5">Semana 5</option>
                    </select>

                    <br><br>

                    <label>Actividad del PAT</label>
                    <select name="idActividad">
                        <!-- Se asume que las actividades se cargan del Plan Institucional -->
                        <option value="1">Integración Grupal</option>
                        <option value="2">Detección de Necesidades</option>
                    </select>
                </fieldset>

                <br>

                <!-- Lista de Alumnos para Marcado de Asistencia -->
                <section>
                    <h3>Lista de Asistencia</h3>
                    <p><span th:text="${#lists.size(estudiantes)}">0</span> alumnos inscritos</p>
                    
                    <table>
                        <thead>
                            <tr>
                                <th>No. Control</th>
                                <th>Estudiante</th>
                                <th>Asistencia</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="estudiante : ${estudiantes}">
                                <td th:text="${estudiante.numeroControl}"></td>
                                <td th:text="${estudiante.usuario.nombre} + ' ' + ${estudiante.usuario.apellidos}"></td>
                                <td>
                                    <!-- Los IDs de los alumnos seleccionados se envían como lista al controlador -->
                                    <input type="checkbox" name="asistencias" th:value="${estudiante.idEstudiante}" checked>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </section>
                    
                <br>

                <!-- Evidencia Fotográfica Requerida para Validación -->
                <section>
                    <h3>Evidencia Fotográfica</h3>
                    <label>Sube una foto de la sesión con tu grupo (Obligatorio)</label>
                    <br>
                    <input type="file" name="fotoEvidencia" accept="image/*" required>
                </section>

                <br>

                <div>
                    <button type="submit">
                        Finalizar y Enviar a Revisión
                    </button>
                </div>
            </form>

            <br><hr><br>

            <!-- Historial de Sesiones Pasadas -->
            <section>
                <h3>Historial de Sesiones</h3>

                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Semana</th>
                            <th>Fecha</th>
                            <th>Actividad PAT</th>
                            <th>Estatus</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="sesion : ${historialSesiones}">
                            <td th:text="'#' + ${sesion.idSesion}"></td>
                            <td th:text="'Semana ' + ${sesion.semanaNumero}"></td>
                            <td th:text="${sesion.fechaImparticion}"></td>
                            <td th:text="${sesion.actividad.titulo}"></td>
                            <td th:text="${sesion.estatusRegistro}"></td>
                            <td>
                                <!-- Enlace para ver el detalle de una sesión ya registrada -->
                                <a th:href="@{/tutor/sesion/{id}(id=${sesion.idSesion})}">Ver Detalles</a>
                            </td>
                        </tr>
                        
                        <tr th:if="${#lists.isEmpty(historialSesiones)}">
                            <td colspan="6">Aún no hay sesiones registradas para este grupo.</td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </section>
        
        <div th:replace="~{fragments/layout :: footer}"></div>
    </main>

</body>
</html>
