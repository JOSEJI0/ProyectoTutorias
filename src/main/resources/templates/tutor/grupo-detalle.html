<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <!-- Mantiene el fragmento de encabezado institucional[cite: 1] -->
    <th:block th:replace="~{fragments/layout :: encabezado('Detalle de Grupo')}"></th:block>
</head>
<body>

    <!-- Mantiene la navegación lateral del tutor[cite: 1] -->
    <div th:replace="~{fragments/layout :: sidebarTutor}"></div>

    <main>
        <section>
            <!-- Cabecera y Navegación de Acciones -->
            <header>
                <a th:href="@{/tutor/grupos}">Volver a Mis Grupos</a>
                
                <div>
                    <!-- Accesos rápidos vinculados al ID del grupo actual -->
                    <form th:action="@{/tutor/pat/seleccionar}" method="POST">
                        <input type="hidden" name="idGrupo" th:value="${grupo.idGrupo}">
                        <button type="submit">Ver PAT</button>
                    </form>
                    <form th:action="@{/tutor/asistencia}" method="POST">
                        <input type="hidden" name="idGrupo" th:value="${grupo.idGrupo}">
                        <button type="submit">Pasar Lista</button>
                    </form>
                </div>
            </header>

            <br>

            <!-- Resumen de Información del Grupo -->
            <section>
                <h1 th:text="${grupo.nombreGrupo}"></h1>
                <p th:text="${grupo.carrera.nombreCarrera}"></p>

                <ul>
                    <li>
                        <strong>Semestre:</strong>
                        <span th:if="${grupo.semestre == null || grupo.semestre == 0}">N/A</span>
                        <span th:unless="${grupo.semestre == null || grupo.semestre == 0}" th:text="${grupo.semestre} + '°'"></span>
                    </li>
                    <li>
                        <strong>Total Alumnos:</strong>
                        <span th:text="${#lists.size(estudiantes)}">0</span>
                    </li>
                    <li>
                        <strong>Horario:</strong>
                        <span th:if="${grupo.horario == null || grupo.horario.isEmpty()}">Por definir</span>
                        <span th:unless="${grupo.horario == null || grupo.horario.isEmpty()}" th:text="${grupo.horario}"></span>
                    </li>
                </ul>
            </section>

            <hr>

            <!-- Directorio de Estudiantes Inscritos -->
            <section>
                <h3>Directorio de Estudiantes</h3>
                
                <table>
                    <thead>
                        <tr>
                            <th>No. Control</th>
                            <th>Nombre del Alumno</th>
                            <th>Correo Institucional</th>
                            <th>Estatus</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Iteración sobre la lista de estudiantes asignados al grupo -->
                        <tr th:each="estudiante : ${estudiantes}">
                            <td th:text="${estudiante.numeroControl}"></td>
                            <td th:text="${estudiante.usuario.nombre} + ' ' + ${estudiante.usuario.apellidos}"></td>
                            <td>
                                <a th:href="'mailto:' + ${estudiante.usuario.correoInstitucional}" th:text="${estudiante.usuario.correoInstitucional}"></a>
                            </td>
                            <td>
                                <span th:if="${estudiante.activo}">Activo</span>
                                <span th:unless="${estudiante.activo}">Baja</span>
                            </td>
                        </tr>
                        
                        <!-- Manejo de grupos vacíos -->
                        <tr th:if="${#lists.isEmpty(estudiantes)}">
                            <td colspan="4">Aún no hay estudiantes inscritos en este grupo.</td>
                        </tr>
                    </tbody>
                </table>
            </section>

        </section>

        <!-- Mantiene el pie de página institucional[cite: 1] -->
        <div th:replace="~{fragments/layout :: footer}"></div>
    </main>

</body>
</html>
