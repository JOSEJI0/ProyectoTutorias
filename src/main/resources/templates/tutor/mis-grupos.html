<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Mis Grupos')}"></th:block>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <div class="flex min-h-screen">
        <div th:replace="~{fragments/layout :: sidebarTutor}"></div>

        <main class="flex-1 flex flex-col min-w-0 h-screen overflow-y-auto custom-scrollbar">
            
            <header class="bg-white border-b border-slate-200 p-8 px-10 sticky top-0 z-30">
                <div class="max-w-7xl mx-auto">
                    <h1 class="text-3xl font-black text-[#0B172A] tracking-tight">Mis Grupos Asignados</h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Periodo Escolar Vigente 2026</p>
                </div>
            </header>

            <div class="p-10 max-w-7xl mx-auto w-full">
                
                <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    
                    <div th:each="grupo : ${grupos}" class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden flex flex-col hover:shadow-xl hover:-translate-y-1 transition-all group">
                        
                        <div class="bg-[#0B172A] p-8 text-white relative overflow-hidden">
                            <p class="text-[10px] font-black text-blue-400 uppercase tracking-[0.2em] mb-1">Grupo</p>
                            <h3 class="text-3xl font-black mb-4">
                                <a th:href="@{/tutor/grupo/{id}/detalle(id=${grupo.idGrupo})}" 
                                   th:text="${grupo.nombreGrupo}"
                                   class="hover:text-amber-400 transition-colors"></a>
                            </h3>
                            <p class="text-xs font-bold text-slate-300 leading-tight" th:text="${grupo.carrera.nombreCarrera}"></p>
                            
                            <i class="fa-solid fa-graduation-cap absolute -right-4 -bottom-4 text-white/5 text-7xl"></i>
                        </div>

                        <div class="p-8 flex-1 space-y-6">
                            <div class="grid grid-cols-2 gap-4">
                                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Semestre</p>
                                    <p class="font-bold text-slate-700">
                                        <span th:if="${grupo.semestre == null || grupo.semestre == 0}">N/A</span>
                                        <span th:unless="${grupo.semestre == null || grupo.semestre == 0}" th:text="${grupo.semestre} + '°'"></span>
                                    </p>
                                </div>
                                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Alumnos</p>
                                    <p class="font-bold text-slate-700" th:text="${#lists.size(grupo.estudiantes)}">0</p>
                                </div>
                            </div>

                            <div class="flex items-start gap-3 px-1">
                                <i class="fa-solid fa-clock text-amber-500 mt-1"></i>
                                <div>
                                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Horario Asignado</p>
                                    <p class="text-sm font-bold text-slate-600">
                                        <span th:if="${grupo.horario == null || grupo.horario.isEmpty()}">Por definir</span>
                                        <span th:unless="${grupo.horario == null || grupo.horario.isEmpty()}" th:text="${grupo.horario}"></span>
                                    </p>
                                </div>
                            </div>
                        </div>

                        <div class="p-6 bg-slate-50 border-t border-slate-100 grid grid-cols-2 gap-3">
                            <form th:action="@{/tutor/pat/seleccionar}" method="POST">
                                <input type="hidden" name="idGrupo" th:value="${grupo.idGrupo}">
                                <button type="submit" class="w-full py-3 rounded-xl border-2 border-[#0B172A] text-[#0B172A] font-black text-[10px] uppercase tracking-widest hover:bg-[#0B172A] hover:text-white transition-all flex items-center justify-center gap-2">
                                    <i class="fa-solid fa-file-invoice"></i> PAT
                                </button>
                            </form>

                            <form th:action="@{/tutor/asistencia}" method="POST">
                                <input type="hidden" name="idGrupo" th:value="${grupo.idGrupo}">
                                <button type="submit" class="w-full py-3 rounded-xl bg-amber-400 text-[#0B172A] font-black text-[10px] uppercase tracking-widest shadow-lg shadow-amber-200 hover:bg-amber-500 hover:-translate-y-1 transition-all flex items-center justify-center gap-2">
                                    <i class="fa-solid fa-check-double"></i> Asistencia
                                </button>
                            </form>
                        </div>
                    </div>

                    <div th:if="${#lists.isEmpty(grupos)}" class="col-span-full py-32 text-center bg-white rounded-[3rem] border border-dashed border-slate-300">
                        <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center text-slate-200 mx-auto mb-6">
                            <i class="fa-solid fa-user-slash text-4xl"></i>
                        </div>
                        <h3 class="text-2xl font-black text-[#0B172A] mb-2 tracking-tight">Sin grupos asignados</h3>
                        <p class="text-slate-400 max-w-sm mx-auto font-medium">La coordinación académica aún no te ha asignado grupos para el periodo actual.</p>
                    </div>

                </section>

                <div th:replace="~{fragments/layout :: footer}"></div>
            </div>
        </main>
    </div>

</body>
</html>
