<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Seleccionar Grupo')}"></th:block>
</head>
<body class="bg-slate-50 min-h-screen flex font-sans text-slate-800">

    <div th:replace="~{fragments/layout :: sidebarTutor}"></div>

    <main class="flex-1 p-10 overflow-y-auto flex flex-col items-center justify-center">
        
        <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-sm border border-slate-200 text-center">
            <div class="w-20 h-20 bg-blue-50 text-[#0B2A4A] rounded-full flex items-center justify-center text-4xl mx-auto mb-6">
                <i class="fa-solid fa-list-check"></i>
            </div>
            
            <h2 class="text-2xl font-bold text-[#0B2A4A] mb-2">Pase de Lista</h2>
            <p class="text-slate-500 mb-8 text-sm">Selecciona el grupo con el que vas a trabajar hoy para registrar las asistencias y evidencias.</p>

            <form th:action="@{/tutor/asistencia}" method="POST" class="space-y-6 text-left">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Grupo Asignado <span class="text-red-500">*</span></label>
                    <select name="idGrupo" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-4 outline-none focus:ring-2 focus:ring-[#0B2A4A] font-medium text-slate-700 cursor-pointer">
                        <option value="" disabled selected>Selecciona un grupo...</option>
                        <option th:each="grupo : ${grupos}" 
                                th:value="${grupo.idGrupo}" 
                                th:text="${grupo.nombreGrupo + ' - ' + grupo.carrera.nombreCarrera}"></option>
                    </select>
                </div>

                <button type="submit" class="w-full bg-[#0B2A4A] text-white px-6 py-4 rounded-xl font-bold shadow-lg hover:bg-[#1a3a5a] transition-all transform hover:-translate-y-1 flex justify-center items-center gap-2">
                    Continuar al Formulario <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
        </div>

    </main>
</body>
</html>
