<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/layout :: encabezado('Seleccionar Grupo')}"></th:block>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <div class="flex min-h-screen">
        <div th:replace="~{fragments/layout :: sidebarTutor}"></div>

        <main class="flex-1 flex flex-col min-w-0">
            
            <header class="bg-white border-b border-slate-200 p-4 px-10 sticky top-0 z-30">
                <div class="flex items-center gap-2 text-xs font-bold text-slate-400 uppercase tracking-widest">
                    <a th:href="@{/tutor/panel}" class="hover:text-blue-600 transition-colors">Panel</a>
                    <i class="fa-solid fa-chevron-right text-[8px]"></i>
                    <span class="text-[#0B172A]">Registro de Sesión</span>
                </div>
            </header>

            <div class="p-10 flex-1 flex flex-col items-center justify-center">
                
                <div class="max-w-xl w-full">
                    
                    <div class="bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200/60 border border-white overflow-hidden">
                        
                        <div class="bg-[#0B172A] p-10 text-white relative overflow-hidden">
                            <div class="relative z-10 text-center">
                                <div class="w-16 h-16 bg-amber-400 text-[#0B172A] rounded-2xl flex items-center justify-center text-3xl shadow-xl mx-auto mb-6">
                                    <i class="fa-solid fa-chalkboard"></i>
                                </div>
                                <h1 class="text-3xl font-black tracking-tight mb-2">Pase de Lista</h1>
                                <p class="text-slate-400 text-sm leading-relaxed">Selecciona el grupo de tutoría para registrar la sesión de hoy.</p>
                            </div>
                            <i class="fa-solid fa-people-roof absolute -right-6 -bottom-6 text-white/5 text-9xl"></i>
                        </div>

                        <form th:action="@{/tutor/asistencia}" method="POST" class="p-10 space-y-8">
                            
                            <div class="space-y-4">
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block px-1 text-center">
                                    Grupos Asignados en el Periodo Actual
                                </label>
                                
                                <div class="relative">
                                    <select name="idGrupo" required 
                                            class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-6 py-5 outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-700 transition-all appearance-none cursor-pointer text-center">
                                        <option value="" disabled selected>— Elige un grupo para comenzar —</option>
                                        <option th:each="grupo : ${grupos}" 
                                                th:value="${grupo.idGrupo}" 
                                                th:text="${grupo.nombreGrupo + ' — ' + grupo.carrera.nombreCarrera}"></option>
                                    </select>
                                    <div class="absolute right-6 top-1/2 -translate-y-1/2 pointer-events-none text-slate-300">
                                        <i class="fa-solid fa-chevron-down text-xs"></i>
                                    </div>
                                </div>
                            </div>

                            <div class="pt-4">
                                <button type="submit" 
                                        class="w-full bg-amber-400 text-[#0B172A] py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl shadow-amber-200/50 hover:bg-amber-500 hover:-translate-y-1 transition-all flex items-center justify-center gap-3">
                                    Continuar al Formulario <i class="fa-solid fa-circle-arrow-right"></i>
                                </button>
                                
                                <p class="text-center mt-6 text-[10px] text-slate-400 font-bold uppercase tracking-tighter">
                                    <i class="fa-solid fa-shield-halved mr-1"></i> Sistema Institucional de Tutorías
                                </p>
                            </div>
                        </form>
                    </div>

                    <div th:if="${#lists.isEmpty(grupos)}" class="mt-8 bg-amber-50 border border-amber-100 p-6 rounded-3xl text-center">
                        <i class="fa-solid fa-triangle-exclamation text-amber-500 text-2xl mb-2"></i>
                        <p class="text-sm font-bold text-amber-700 leading-tight">
                            No tienes grupos asignados para el periodo actual.<br>
                            <span class="text-[10px] font-medium text-amber-600/70">Contacta a coordinación académica para tu asignación.</span>
                        </p>
                    </div>

                </div>

                <div th:replace="~{fragments/layout :: footer}"></div>
            </div>
        </main>
    </div>

</body>
</html>
