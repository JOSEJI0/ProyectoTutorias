<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <!-- Mantenemos el fragmento de encabezado institucional[cite: 1] -->
    <th:block th:replace="~{fragments/layout :: encabezado('Seleccionar Grupo')}"></th:block>
</head>
<body>

    <!-- Mantenemos la navegación lateral para el rol de tutor[cite: 1] -->
    <div th:replace="~{fragments/layout :: sidebarTutor}"></div>

    <main>
        <section>
            <header>
                <h2>Pase de Lista</h2>
                <p>Selecciona el grupo con el que vas a trabajar hoy para registrar las asistencias y evidencias.</p>
            </header>

            <!-- Formulario de selección de grupo para pase de lista -->
            <form th:action="@{/tutor/asistencia}" method="POST">
                <div>
                    <label>Grupo Asignado *</label>
                    <br>
                    <select name="idGrupo" required>
                        <option value="" disabled selected>Selecciona un grupo...</option>
                        <!-- Itera sobre la lista de grupos donde el docente es tutor -->
                        <option th:each="grupo : ${grupos}" 
                                th:value="${grupo.idGrupo}" 
                                th:text="${grupo.nombreGrupo + ' - ' + grupo.carrera.nombreCarrera}"></option>
                    </select>
                </div>

                <br>

                <button type="submit">
                    Continuar al Formulario
                </button>
            </form>
        </section>
    </main>

    <!-- Mantenemos el fragmento de pie de página[cite: 1] -->
    <div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
